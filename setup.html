<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Code Agent — 詳細設定</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; min-height: 100vh; }
  header { background: #181825; border-bottom: 1px solid #313244; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
  header a { color: #6c7086; text-decoration: none; font-size: 13px; }
  header a:hover { color: #cdd6f4; }
  header h1 { font-size: 16px; font-weight: bold; }
  .container { max-width: 760px; margin: 32px auto; padding: 0 20px 80px; }
  .section { background: #181825; border: 1px solid #313244; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
  .section-header { padding: 14px 20px; border-bottom: 1px solid #313244; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .section-header:hover { background: #1e1e2e; }
  .section-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #a6adc8; }
  .field input, .field select { background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; padding: 8px 10px; font-size: 13px; outline: none; width: 100%; }
  .field input:focus, .field select:focus { border-color: #89b4fa; }
  .field .hint { font-size: 11px; color: #6c7086; margin-top: 2px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .chevron { margin-left: auto; transition: transform 0.2s; }
  .collapsed .chevron { transform: rotate(-90deg); }
  .collapsed .section-body { display: none; }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #313244; color: #6c7086; font-weight: normal; }
  /* プロバイダーカード */
  .provider-card { border: 1px solid #313244; border-radius: 8px; padding: 14px; margin-bottom: 12px; position: relative; }
  .provider-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #313244; }
  .provider-card-icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; width: 22px; height: 22px; }
  .provider-card-icon svg { width: 22px; height: 22px; }
  .provider-type-select { flex: 1; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; padding: 7px 10px; font-size: 13px; outline: none; font-weight: bold; }
  .provider-type-select:focus { border-color: #89b4fa; }
  .provider-fields { display: flex; flex-direction: column; gap: 12px; }
  .remove-card-btn { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; line-height: 1; }
  .remove-card-btn:hover { background: #f38ba820; color: #f38ba8; }
  .add-provider-btn { background: #313244; border: 1px dashed #45475a; border-radius: 6px; color: #89b4fa; padding: 10px; width: 100%; cursor: pointer; font-size: 13px; text-align: center; margin-top: 4px; }
  .add-provider-btn:hover { border-color: #89b4fa; background: #1e1e2e; }
  .fetch-models-btn { background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #89b4fa; padding: 7px 10px; cursor: pointer; font-size: 13px; flex-shrink: 0; white-space: nowrap; }
  .fetch-models-btn:hover { border-color: #89b4fa; }
  .fetch-models-btn:disabled { color: #6c7086; cursor: not-allowed; }
  /* 下部保存バー */
  .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #181825; border-top: 1px solid #313244; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
  .save-btn { background: #89b4fa; color: #1e1e2e; border: none; border-radius: 6px; padding: 8px 24px; font-size: 14px; font-weight: bold; cursor: pointer; }
  .save-btn:hover { background: #74c7ec; }
  .save-btn:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }
  #save-status { font-size: 13px; }
</style>
</head>
<body>
<header>
  <a href="/">← チャットに戻る</a>
  <h1>🔧 詳細設定（.env）</h1>
</header>

<div class="container">

  <!-- LLMプロバイダー -->
  <div class="section" id="sec-providers">
    <div class="section-header" onclick="toggleSection('sec-providers')">
      🤖 LLMプロバイダー <span class="tag">1つ以上必須</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <div id="provider-list"></div>
      <button class="add-provider-btn" onclick="addProviderCard()">＋ プロバイダーを追加</button>
    </div>
  </div>

  <!-- エージェント設定 -->
  <div class="section" id="sec-agent">
    <div class="section-header" onclick="toggleSection('sec-agent')">
      🤖 エージェント設定
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <div class="field">
        <label>エージェント名（自己紹介時に使う名前）</label>
        <input id="agent-name" type="text" placeholder="SPEC-AI">
      </div>
      <div class="row">
        <div class="field">
          <label>作業ディレクトリ</label>
          <input id="agent-workdir" type="text" placeholder="./workspace">
        </div>
        <div class="field">
          <label>コマンドタイムアウト（秒）</label>
          <input id="agent-timeout" type="number" placeholder="30" min="5" max="300">
        </div>
      </div>
    </div>
  </div>

  <!-- GitLab -->
  <div class="section" id="sec-gitlab">
    <div class="section-header" onclick="toggleSection('sec-gitlab')">
      🦊 GitLab 連携 <span class="tag">省略可</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <div class="row">
        <div class="field">
          <label>ユーザー名</label>
          <input id="gl-user" type="text" placeholder="your.name">
        </div>
        <div class="field">
          <label>Personal Access Token (PAT)</label>
          <input id="gl-pat" type="text" placeholder="（未設定）">
          <span class="hint" id="gl-pat-hint"></span>
        </div>
      </div>
      <div class="field">
        <label>メールアドレス（git コミットのアバター表示に使用）</label>
        <input id="gl-email" type="text" placeholder="your@email.com">
        <span class="hint" id="gl-email-hint"></span>
      </div>
    </div>
  </div>

  <!-- Ansible クレデンシャル -->
  <div class="section" id="sec-ansible">
    <div class="section-header" onclick="toggleSection('sec-ansible')">
      🎮 Ansible クレデンシャル <span class="tag">workspace/.azure_creds</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <div style="font-size:12px;color:#6c7086;margin-bottom:4px;">このファイルは <code>workspace/.azure_creds</code> に保存されます（.gitignore 対象・サーバー再起動不要）</div>
      <div class="row">
        <div class="field">
          <label>AZURE_SUBSCRIPTION_ID</label>
          <input id="ans-sub" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>
        <div class="field">
          <label>AZURE_TENANT</label>
          <input id="ans-tenant" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>AZURE_CLIENT_ID</label>
          <input id="ans-client" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>
        <div class="field">
          <label>AZURE_SECRET</label>
          <input id="ans-secret" type="password" placeholder="（未設定）">
          <span class="hint" id="ans-secret-hint"></span>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>AZURE_ENV_NAME</label>
          <input id="ans-env" type="text" placeholder="SPECUSER005">
        </div>
        <div class="field">
          <label>no_proxy（プロキシ除外ホスト）</label>
          <input id="ans-noproxy" type="text" placeholder="management.azure.com,login.microsoftonline.com,...">
        </div>
      </div>
      <div style="margin-top:4px;">
        <button class="save-btn" style="font-size:13px;padding:7px 18px;" onclick="saveAnsibleCreds()">💾 クレデンシャルを保存</button>
        <button class="save-btn" style="font-size:13px;padding:7px 18px;background:#f38ba8;margin-left:8px;" onclick="clearAnsibleCreds()">🗑 消去</button>
        <span id="ans-save-status" style="margin-left:10px;font-size:13px;"></span>
      </div>
    </div>
  </div>

  <!-- SearXNG / 検索 -->
  <div class="section" id="sec-searxng">
    <div class="section-header" onclick="toggleSection('sec-searxng')">
      🔍 検索バックエンド <span class="tag">省略可</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <div class="row">
        <div class="field">
          <label>SearXNG ベース URL</label>
          <input id="sx-url" type="text" placeholder="http://localhost:8888">
        </div>
        <div class="field">
          <label>SearXNG 有効化</label>
          <select id="sx-enabled">
            <option value="false">無効</option>
            <option value="true">有効</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Tavily Search API キー <span class="tag">推奨・無料1000クエリ/月・カード不要</span></label>
        <input id="sx-tavily-key" type="password" placeholder="tvly-...（未設定）" autocomplete="off">
        <span class="hint" id="sx-tavily-hint">未設定 — <a href="https://tavily.com" target="_blank" style="color:#89b4fa">tavily.com</a> で取得（無料・カード不要）</span>
      </div>
    </div>
  </div>

</div>

<div class="save-bar">
  <button class="save-btn" id="save-btn" onclick="saveConfig()">💾 保存してサーバーを再起動</button>
  <span id="save-status"></span>
</div>

<script>
// ---- プロバイダー定義 ----
const PROVIDER_TYPES = [
  { value: 'azure_openai',  label: 'Azure OpenAI' },
  { value: 'azure_foundry', label: 'Azure AI Foundry' },
  { value: 'gemini',        label: 'Google Gemini' },
];

const PROVIDER_SVG = {
  azure_openai:  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"><path fill="#0078d4" fill-rule="evenodd" clip-rule="evenodd" d="M4.998 13.098v37.8a8.1 8.1 0 0 0 8.1 8.1h37.8a8.1 8.1 0 0 0 8.1-8.1v-37.8a8.1 8.1 0 0 0-8.1-8.1h-37.8a8.1 8.1 0 0 0-8.1 8.1m32.4-8.1v10.8c0 11.928 9.672 21.6 21.6 21.6h-10.8c-11.928 0-21.597 9.666-21.6 21.594V48.198c0-11.928-9.672-21.6-21.6-21.6h10.8c11.928 0 21.6-9.672 21.6-21.6"/></svg>`,
  azure_foundry: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" fill="none"><path fill="#c4b5fd" d="M11.958 11.683c.037 0 .074-.1.074-.238V7.577c0-.853.66-1.76 1.585-2.034-.057-.188-.645-2.112-.81-2.646C12.631 2.335 12.131 1 11.52 1l-.014.001q-.07.013-.135.129c-.32.583-.463 3.015-.463 4.837V8.23c.275.97.912 3.217.961 3.353 0 0 .05.1.088.1"/><path fill="#7c3aed" d="M16.015 5.456h-1.807c-1.214 0-2.175 1.085-2.175 2.109v3.867c0 .139-.037.239-.074.239-.038 0-.088-.1-.088-.1s.075.212.175.212h1.98c.616 0 2.475-.611 2.475-2.52V6.006c0-.414-.237-.551-.486-.551"/><path fill="#4c1d95" d="M2.336 17h5.38c2.346 0 3.194-2.034 3.194-3.807V5.967c0-2.084.188-4.967.612-4.967H8.296c-.768 0-1.43.824-2.178 2.484-.75 1.66-4.357 11.872-4.518 12.355-.262.787-.025 1.161.736 1.161"/></svg>`,
  gemini:        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="#4285f4" d="M50 3C48.5 33 37 47 3 50C37 53 48.5 67 50 97C51.5 67 63 53 97 50C63 47 51.5 33 50 3Z"/></svg>`,
};

// ---- フィールド定義 ----
// select の全オプションからモデル一覧を生成するヘルパー
function buildModelOpts(current, list) {
  const opts = list ? list.split(',').map(s => s.trim()).filter(Boolean) : [];
  if (current && !opts.includes(current)) opts.unshift(current);
  if (!opts.length) return `<option value="">(🔍 で取得)</option>`;
  return opts.map(m => `<option value="${esc(m)}"${m===current?' selected':''}>${esc(m)}</option>`).join('');
}

// モデル選択UI（select + 🔍 + 手動追加行）を生成
function modelSelectBlock(selectName, current, list, addHint='') {
  const opts = buildModelOpts(current, list);
  return `
    <div style="display:flex;gap:6px;align-items:center">
      <select name="${selectName}" class="model-select" style="flex:1">${opts}</select>
      <button type="button" class="fetch-models-btn" onclick="fetchModelsBtn(this)" title="サーバーからモデル一覧を取得">🔍</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:5px">
      <input type="text" class="model-add-input" placeholder="モデル名を手動追加..." style="flex:1;background:#313244;border:1px solid #45475a;border-radius:6px;color:#cdd6f4;padding:6px 10px;font-size:13px;outline:none">
      <button type="button" class="fetch-models-btn" onclick="addModelOption(this)" title="追加">＋</button>
    </div>
    ${addHint ? `<span class="hint">${addHint}</span>` : ''}`;
}

function renderFields(type, data = {}) {
  const hint = data.api_key_set ? '現在: 設定済み' : '未設定';
  const keyPlaceholder = data.api_key_set ? '' : '（未設定）';

  if (type === 'azure_openai') return `
    <div class="field">
      <label>表示名</label>
      <input type="text" name="name" value="${esc(data.name||'')}" placeholder="Azure OpenAI">
    </div>
    <div class="field">
      <label>エンドポイント URL</label>
      <input type="text" name="endpoint" value="${esc(data.endpoint||'')}" placeholder="https://your-resource.openai.azure.com">
    </div>
    <div class="field">
      <label>API キー</label>
      <input type="text" name="api_key" value="${esc(data.api_key||'')}" placeholder="${keyPlaceholder}">
      <span class="hint">${hint}</span>
    </div>
    <div class="row">
      <div class="field">
        <label>デプロイ名（カンマ区切りで複数可）</label>
        <input type="text" name="deployments" value="${esc(data.deployments||data.deployment||'')}" placeholder="gpt-5-mini,gpt-4.1-mini">
        <span class="hint">Azureポータルのデプロイ名を入力（例: gpt-5-mini）</span>
      </div>
      <div class="field">
        <label>API バージョン</label>
        <input type="text" name="api_version" value="${esc(data.api_version||'2025-01-01-preview')}" placeholder="2025-01-01-preview">
      </div>
    </div>`;

  if (type === 'azure_foundry') return `
    <div class="field">
      <label>表示名</label>
      <input type="text" name="name" value="${esc(data.name||'')}" placeholder="Azure AI Foundry">
    </div>
    <div class="field">
      <label>エンドポイント URL</label>
      <input type="text" name="endpoint" value="${esc(data.endpoint||'')}" placeholder="https://your-project.cognitiveservices.azure.com/">
    </div>
    <div class="field">
      <label>API キー</label>
      <input type="text" name="api_key" value="${esc(data.api_key||'')}" placeholder="${keyPlaceholder}">
      <span class="hint">${hint}</span>
    </div>
    <div class="row">
      <div class="field">
        <label>使用モデル（カンマ区切りで複数可）</label>
        <input type="text" name="models" value="${esc(data.models||data.model||'')}" placeholder="gpt-4.1-mini,gpt-5-mini">
        <span class="hint">Azureポータルのデプロイ名を入力（例: gpt-4.1-mini）</span>
      </div>
      <div class="field">
        <label>API バージョン</label>
        <input type="text" name="api_version" value="${esc(data.api_version||'2024-12-01-preview')}" placeholder="2024-12-01-preview">
      </div>
    </div>`;

  if (type === 'gemini') return `
    <div class="field">
      <label>API キー</label>
      <input type="text" name="api_key" value="${esc(data.api_key||'')}" placeholder="${keyPlaceholder}">
      <span class="hint">${hint}</span>
    </div>
    <div class="field">
      <label>使用モデル</label>
      ${modelSelectBlock('model', data.model||data.models?.split(',')[0], data.models, '空欄の場合はデフォルト一覧を使用')}
    </div>`;

  return '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- カード操作 ----
function buildCard(data, isFirst) {
  const card = document.createElement('div');
  card.className = 'provider-card';
  const typeOptions = PROVIDER_TYPES.map(t =>
    `<option value="${t.value}"${t.value === data.type ? ' selected' : ''}>${t.label}</option>`
  ).join('');
  card.innerHTML = `
    <div class="provider-card-header">
      <span class="provider-card-icon">${PROVIDER_SVG[data.type] || ''}</span>
      <select class="provider-type-select" onchange="onTypeChange(this)">
        ${typeOptions}
      </select>
      ${isFirst ? '' : '<button class="remove-card-btn" onclick="removeCard(this)" title="削除">✕</button>'}
    </div>
    <div class="provider-fields">${renderFields(data.type, data)}</div>`;
  return card;
}

function onTypeChange(sel) {
  const card = sel.closest('.provider-card');
  card.querySelector('.provider-card-icon').innerHTML = PROVIDER_SVG[sel.value] || '';
  card.querySelector('.provider-fields').innerHTML = renderFields(sel.value, {});
}

function addProviderCard(data = { type: 'azure_openai' }) {
  const list = document.getElementById('provider-list');
  const isFirst = list.children.length === 0;
  list.appendChild(buildCard(data, isFirst));
}

function removeCard(btn) {
  const list = document.getElementById('provider-list');
  if (list.children.length > 1) btn.closest('.provider-card').remove();
}

function getCardData(card) {
  const type = card.querySelector('.provider-type-select').value;
  const data = { type };
  card.querySelectorAll('.provider-fields [name]').forEach(el => {
    if (el.classList.contains('model-select')) {
      // 選択値 = デフォルト、全オプション = 一覧（選択値を先頭に）
      data[el.name] = el.value;
      const listKey = el.name === 'deployment' ? 'deployments' : 'models';
      const allOpts = [...el.options].map(o => o.value).filter(Boolean);
      const ordered = el.value
        ? [el.value, ...allOpts.filter(v => v !== el.value)]
        : allOpts;
      data[listKey] = ordered.join(',');
    } else {
      data[el.name] = el.value;
    }
  });
  return data;
}

function addModelOption(btn) {
  const card = btn.closest('.provider-card');
  const input = card.querySelector('.model-add-input');
  const val = input.value.trim();
  if (!val) return;
  const sel = card.querySelector('.model-select');
  if ([...sel.options].some(o => o.value === val)) { input.value = ''; return; }
  sel.add(new Option(val, val, false, true));
  input.value = '';
}

// ---- セクション開閉 ----
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ---- モデル取得 ----
async function fetchModelsBtn(btn) {
  const card = btn.closest('.provider-card');
  const type = card.querySelector('.provider-type-select').value;
  const endpointEl = card.querySelector('[name=endpoint]');
  const endpoint = endpointEl ? endpointEl.value : '';

  btn.textContent = '⏳';
  btn.disabled = true;

  try {
    const params = new URLSearchParams({ type, endpoint });
    const resp = await fetch('/setup/fetch-models?' + params);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    // model-select の options を取得結果で置き換え
    const sel = card.querySelector('select.model-select');
    if (sel) {
      const current = sel.value;
      sel.innerHTML = data.models.map(m =>
        `<option value="${esc(m)}"${m===current?' selected':''}>${esc(m)}</option>`
      ).join('');
      if (!sel.value && data.models.length) sel.value = data.models[0];
    }

    btn.textContent = '✓';
  } catch(e) {
    btn.textContent = '✗';
    alert('モデル取得失敗: ' + e.message);
  } finally {
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '🔍'; }, 2000);
  }
}

// ---- 読み込み ----
async function loadConfig() {
  try {
    const d = await fetch('/setup/current').then(r => r.json());

    // プロバイダーカードを構築
    const list = document.getElementById('provider-list');
    list.innerHTML = '';
    const providers = d.providers && d.providers.length > 0
      ? d.providers
      : [{ type: 'azure_openai' }];
    providers.forEach((prov, i) => addProviderCard(prov));
    // 先頭カードは削除ボタンを非表示にする（addProviderCard 内で isFirst=true にしても
    // 後から追加した場合を考慮して再確認）
    updateFirstCard();

    // エージェント
    document.getElementById('agent-name').value    = d.agent.name;
    document.getElementById('agent-workdir').value  = d.agent.workdir;
    document.getElementById('agent-timeout').value  = d.agent.timeout;

    // GitLab
    document.getElementById('gl-user').value  = d.gitlab.user;
    document.getElementById('gl-pat').value   = d.gitlab.pat || '';
    document.getElementById('gl-pat').placeholder = d.gitlab.pat_set ? '' : '（未設定）';
    document.getElementById('gl-pat-hint').textContent = d.gitlab.pat_set ? '現在: 設定済み' : '未設定';
    document.getElementById('gl-email').value = d.gitlab.email || '';
    document.getElementById('gl-email-hint').textContent = d.gitlab.email ? `現在の git config: ${d.gitlab.email}` : '未設定（保存時に git config --global user.email を更新）';

    // SearXNG / 検索
    document.getElementById('sx-url').value     = d.searxng.url;
    document.getElementById('sx-enabled').value = d.searxng.enabled;
    if (d.searxng.tavily_api_key_set) {
      document.getElementById('sx-tavily-key').value = '***';
      document.getElementById('sx-tavily-hint').textContent = '現在: 設定済み';
    } else {
      document.getElementById('sx-tavily-key').placeholder = 'tvly-...（未設定）';
      document.getElementById('sx-tavily-hint').textContent = '未設定 — tavily.com で取得（無料・カード不要）';
    }
  } catch(e) {
    document.getElementById('save-status').textContent = '⚠️ 設定の読み込みに失敗しました';
  }
}

function updateFirstCard() {
  const cards = document.querySelectorAll('.provider-card');
  cards.forEach((card, i) => {
    const removeBtn = card.querySelector('.remove-card-btn');
    if (i === 0) {
      if (removeBtn) removeBtn.remove();
    }
  });
}

// ---- 保存 ----
async function saveConfig() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = '保存中...';
  status.style.color = '#6c7086';

  const providers = Array.from(document.querySelectorAll('.provider-card')).map(getCardData);

  const payload = {
    providers,
    agent: {
      name:    document.getElementById('agent-name').value,
      workdir: document.getElementById('agent-workdir').value,
      timeout: document.getElementById('agent-timeout').value,
    },
    gitlab: {
      user:  document.getElementById('gl-user').value,
      pat:   document.getElementById('gl-pat').value,
      email: document.getElementById('gl-email').value,
    },
    searxng: {
      url:            document.getElementById('sx-url').value,
      enabled:        document.getElementById('sx-enabled').value,
      tavily_api_key: document.getElementById('sx-tavily-key').value,
    },
  };

  try {
    const res = await fetch('/setup/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      status.textContent = '✓ 保存しました。サーバーを再起動しています...';
      status.style.color = '#a6e3a1';
      // 再起動完了をポーリングで検知（最大15秒）
      const deadline = Date.now() + 15000;
      let ready = false;
      while (Date.now() < deadline) {
        await new Promise(r => setTimeout(r, 800));
        try {
          const r = await fetch('/providers/current', { signal: AbortSignal.timeout(1000) });
          if (r.ok) { ready = true; break; }
        } catch {}
      }
      status.textContent = ready
        ? '✓ 完了。チャット画面をリロードしてください。'
        : '⚠️ 再起動に時間がかかっています。しばらく待ってからリロードしてください。';
      btn.disabled = false;
    } else {
      throw new Error(data.error || '不明なエラー');
    }
  } catch(e) {
    status.textContent = '⚠️ ' + e.message;
    status.style.color = '#f38ba8';
    btn.disabled = false;
  }
}

// ---- Ansible クレデンシャル読み込み ----
async function loadAnsibleCreds() {
  try {
    const d = await fetch('/setup/ansible-creds').then(r => r.json());
    document.getElementById('ans-sub').value    = d.AZURE_SUBSCRIPTION_ID || '';
    document.getElementById('ans-tenant').value = d.AZURE_TENANT || '';
    document.getElementById('ans-client').value = d.AZURE_CLIENT_ID || '';
    document.getElementById('ans-env').value    = d.AZURE_ENV_NAME || '';
    document.getElementById('ans-noproxy').value = d.no_proxy || '';
    if (d.AZURE_SECRET) {
      document.getElementById('ans-secret').placeholder = '（設定済み — 変更する場合のみ入力）';
      document.getElementById('ans-secret-hint').textContent = '設定済み';
    }
  } catch(e) { /* ファイル未作成は正常 */ }
}

// ---- Ansible クレデンシャル保存 ----
async function saveAnsibleCreds() {
  const status = document.getElementById('ans-save-status');
  status.textContent = '保存中...';
  status.style.color = '#6c7086';
  try {
    const secret = document.getElementById('ans-secret').value;
    const payload = {
      AZURE_SUBSCRIPTION_ID: document.getElementById('ans-sub').value,
      AZURE_TENANT:          document.getElementById('ans-tenant').value,
      AZURE_CLIENT_ID:       document.getElementById('ans-client').value,
      AZURE_ENV_NAME:        document.getElementById('ans-env').value,
      no_proxy:              document.getElementById('ans-noproxy').value,
    };
    if (secret) payload.AZURE_SECRET = secret;
    const r = await fetch('/setup/ansible-creds/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (data.ok) {
      status.textContent = '✓ 保存しました';
      status.style.color = '#a6e3a1';
      if (secret) {
        document.getElementById('ans-secret').value = '';
        document.getElementById('ans-secret').placeholder = '（設定済み — 変更する場合のみ入力）';
        document.getElementById('ans-secret-hint').textContent = '設定済み';
      }
    } else {
      throw new Error(data.error || '不明なエラー');
    }
  } catch(e) {
    status.textContent = '⚠️ ' + e.message;
    status.style.color = '#f38ba8';
  }
}

async function clearAnsibleCreds() {
  if (!confirm('workspace/.azure_creds の内容をすべて消去しますか？')) return;
  const status = document.getElementById('ans-save-status');
  status.textContent = '消去中...';
  status.style.color = '#6c7086';
  try {
    const r = await fetch('/setup/ansible-creds/clear', { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      ['ans-sub','ans-tenant','ans-client','ans-secret','ans-env','ans-noproxy'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('ans-secret').placeholder = '（未設定）';
      document.getElementById('ans-secret-hint').textContent = '';
      status.textContent = '✓ 消去しました';
      status.style.color = '#a6e3a1';
    } else {
      throw new Error(data.error || '不明なエラー');
    }
  } catch(e) {
    status.textContent = '⚠️ ' + e.message;
    status.style.color = '#f38ba8';
  }
}

loadConfig();
loadAnsibleCreds();
</script>
