<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Code Agent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚛️</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 10px 20px; background: #181825; border-bottom: 1px solid #313244; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  #header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  #turn-count { font-size: 11px; color: #6c7086; font-weight: normal; }
  #clear-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #clear-btn:hover { background: #f38ba8; color: #1e1e2e; }
  #cleanup-btn { padding: 4px 8px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #cleanup-btn:hover { background: #a6e3a1; color: #1e1e2e; }
  #gitlab-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; display: none; }
  #gitlab-btn:hover { background: #fab387; color: #1e1e2e; }
  #gitlab-panel { position: fixed; top: 44px; right: 0; width: 340px; height: calc(100vh - 44px); background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.2s ease; }
  #gitlab-panel.open { transform: translateX(0); }
  #gitlab-panel-header { padding: 12px 16px; border-bottom: 1px solid #313244; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #gitlab-panel-close { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  #gitlab-panel-close:hover { color: #cdd6f4; }
  #gitlab-search { margin: 10px 12px; padding: 6px 10px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; font-size: 13px; outline: none; width: calc(100% - 24px); flex-shrink: 0; }
  #gitlab-search:focus { border-color: #89b4fa; }
  #gitlab-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .gl-project { padding: 9px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; }
  .gl-project:hover { background: #313244; border-color: #45475a; }
  .gl-project-name { font-size: 13px; font-weight: bold; color: #cdd6f4; }
  .gl-project-ns { font-size: 11px; color: #6c7086; margin-top: 1px; }
  .gl-project-desc { font-size: 11px; color: #a6adc8; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gl-project-meta { font-size: 10px; color: #45475a; margin-top: 4px; display: flex; gap: 8px; align-items: center; }
  .gl-badge { padding: 1px 5px; border-radius: 3px; background: #313244; color: #6c7086; }
  #gitlab-status { padding: 24px 16px; text-align: center; color: #6c7086; font-size: 13px; }
  #chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; align-items: center; gap: 0; }
  .turn { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; width: 100%; max-width: 860px; }
  /* メッセージラッパー（ロールラベル + バブル）*/
  .msg-wrapper { display: flex; flex-direction: column; gap: 4px; }
  .user-wrapper { align-self: flex-end; align-items: flex-end; max-width: 78%; }
  .ai-wrapper { align-self: flex-start; align-items: flex-start; width: 100%; }
  /* ロールラベル */
  .msg-role-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 0 3px; }
  .user-wrapper .msg-role-label { color: #6c7086; }
  .ai-wrapper .msg-role-label { color: #a6e3a1; }
  /* メッセージバブル */
  .msg { padding: 12px 16px; border-radius: 12px; line-height: 1.75; word-break: break-word; font-size: 14px; }
  .msg.user { white-space: pre-wrap; background: #313244; color: #cdd6f4; border-radius: 12px 12px 4px 12px; border: 1px solid #45475a; }
  .msg.ai { white-space: normal; background: transparent; padding: 6px 0 6px 16px; border-left: 3px solid #45475a; border-radius: 0; width: 100%; }
  /* ---- スピナー＋状態表示 (Claude Code スタイル) ---- */
  .status-line { display: flex; align-items: center; gap: 8px; align-self: flex-start; color: #6c7086; font-size: 13px; padding: 2px 4px; font-family: 'Consolas', monospace; }
  .spinner { width: 12px; height: 12px; border: 2px solid #45475a; border-top-color: #89b4fa; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-group { background: #181825; border: 1px solid #313244; border-left: 3px solid #a6e3a1; border-radius: 0 8px 8px 0; margin: 4px 0; width: 100%; }
  .tool-group > summary { padding: 7px 14px; cursor: pointer; color: #a6e3a1; font-family: monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; list-style: none; user-select: none; }
  .tool-group > summary::-webkit-details-marker { display: none; }
  .tool-group[open] > summary::after { content: ' ▲'; font-size: 10px; }
  .tool-group:not([open]) > summary::after { content: ' ▼'; font-size: 10px; }
  .tool-group-inner { padding: 0 8px 8px 8px; }
  .tool-block { align-self: flex-start; background: #1e1e2e; border: 1px solid #313244; border-radius: 6px; padding: 6px 12px; font-family: monospace; font-size: 13px; width: 100%; max-width: 100%; margin: 3px 0; }
  .tool-block .label { color: #a6e3a1; font-size: 11px; font-weight: 600; margin-bottom: 2px; letter-spacing: 0.04em; }
  .tool-block .tool-desc { color: #cba6f7; font-size: 12px; margin-bottom: 4px; font-style: italic; }
  .tool-block .args { color: #fab387; }
  .tool-block .result { color: #cdd6f4; margin-top: 4px; max-height: 120px; overflow-y: auto; }
  .diff-block { font-family: monospace; font-size: 12px; line-height: 1.5; }
  .diff-add  { color: #a6e3a1; background: rgba(166,227,161,0.08); display: block; }
  .diff-del  { color: #f38ba8; background: rgba(243,139,168,0.08); display: block; }
  .diff-hunk { color: #89dceb; display: block; }
  .diff-meta { color: #6c7086; display: block; }
  .folded-turns { margin-bottom: 16px; width: 100%; max-width: 860px; }
  .folded-turns > summary {
    list-style: none; cursor: pointer; padding: 6px 14px;
    color: #6c7086; font-size: 12px;
    border: 1px dashed #313244; border-radius: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .folded-turns > summary:hover { background: #181825; color: #cdd6f4; }
  .folded-turns[open] > summary { color: #cdd6f4; margin-bottom: 8px; }
  .folded-turns > summary::before { content: '▸'; transition: transform 0.2s; }
  .folded-turns[open] > summary::before { content: '▾'; }
  .folded-inner { display: flex; flex-direction: column; gap: 0; }
  #skill-popup { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: min(860px, calc(100% - 40px)); background: #1e1e2e; border: 1px solid #45475a; border-bottom: none; border-radius: 10px 10px 0 0; z-index: 200; overflow: hidden; }
  .skill-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid #313244; }
  .skill-item:last-child { border-bottom: none; }
  .skill-item:hover, .skill-item.active { background: #313244; }
  .skill-trigger { color: #cba6f7; font-family: monospace; font-size: 13px; min-width: 140px; }
  .skill-desc { color: #a6adc8; font-size: 12px; }
  #input-area { padding: 10px 20px 14px; background: #181825; border-top: 1px solid #313244; }
  #input-box { max-width: 860px; margin: 0 auto; border: 1px solid #45475a; border-radius: 12px; background: #313244; display: flex; flex-direction: column; padding: 10px 12px 8px; gap: 6px; transition: border-color 0.15s; }
  #input-box:focus-within { border-color: #89b4fa; }
  #input { background: transparent; border: none; color: #cdd6f4; font-size: 14px; outline: none; resize: none; line-height: 1.5; max-height: 200px; overflow-y: auto; padding: 0; width: 100%; }
  #image-preview-area { display: flex; gap: 8px; flex-wrap: wrap; }
  #input-bottom { display: flex; align-items: center; justify-content: space-between; }
  #input-left { display: flex; align-items: center; gap: 2px; }
  #input-right { display: flex; align-items: center; gap: 4px; }
  #attach-btn { padding: 5px 8px; background: transparent; color: #6c7086; border: none; border-radius: 6px; cursor: pointer; font-size: 20px; line-height: 1; }
  #attach-btn:hover { background: #45475a; color: #cdd6f4; }
  #mic-btn { padding: 5px 8px; background: transparent; color: #6c7086; border: none; border-radius: 6px; cursor: pointer; font-size: 20px; line-height: 1; transition: background 0.2s; }
  #mic-btn:hover { background: #45475a; color: #cdd6f4; }
  #mic-btn.recording { background: #f38ba8; color: #1e1e2e; animation: mic-pulse 1s ease-in-out infinite; }
  #mic-btn.unsupported { opacity: 0.4; cursor: not-allowed; }
  #bypass-btn { padding: 4px 8px; background: transparent; color: #6c7086; border: 1px solid #45475a; border-radius: 6px; cursor: pointer; font-size: 14px; line-height: 1.4; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
  #bypass-btn:hover { color: #cdd6f4; border-color: #6c7086; }
  #bypass-btn.active { color: #a6e3a1; border-color: #a6e3a1; font-weight: bold; }
  @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(243,139,168,0.6); } 50% { box-shadow: 0 0 0 6px rgba(243,139,168,0); } }
  #send { padding: 6px 16px; background: #89b4fa; color: #1e1e2e; border: none; border-radius: 7px; cursor: pointer; font-weight: bold; font-size: 13px; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #stop { padding: 6px 16px; background: #f38ba8; color: #1e1e2e; border: none; border-radius: 7px; cursor: pointer; font-weight: bold; font-size: 13px; display: none; }
  #gen-status { display: none; font-size: 13px; color: #cdd6f4; font-family: monospace; }
  .img-preview { position: relative; }
  .img-preview img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid #45475a; }
  .img-preview-del { position: absolute; top: -4px; right: -4px; background: #f38ba8; color: #1e1e2e; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; line-height: 16px; text-align: center; padding: 0; }
  .msg-img { max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 6px; display: block; }
  /* ---- プロバイダー設定 ---- */
  #provider-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #provider-btn:hover { background: #cba6f7; color: #1e1e2e; }
  #provider-label { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #89b4fa; font-weight: normal; max-width: 180px; overflow: hidden; flex-shrink: 0; }
  #provider-label svg { width: 18px; height: 18px; flex-shrink: 0; }
  .pv-icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pv-icon svg { width: 18px; height: 18px; }
  #model-select { background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 6px; padding: 3px 6px; font-size: 12px; cursor: pointer; max-width: 140px; }
  #model-select:hover { border-color: #89b4fa; }
  #model-select:focus { outline: none; border-color: #89b4fa; }
  #token-info { font-size: 11px; color: #a6adc8; white-space: nowrap; cursor: default; }
  #token-info span.tok-in  { color: #89dceb; }
  #token-info span.tok-out { color: #a6e3a1; }
  #token-info span.tok-total { color: #f9e2af; }
  #provider-panel { position: fixed; top: 44px; right: 0; width: 340px; height: calc(100vh - 44px); background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.2s ease; overflow-y: auto; }
  #provider-panel.open { transform: translateX(0); }
  #provider-panel-header { padding: 12px 16px; border-bottom: 1px solid #313244; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #provider-panel-close { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  #provider-panel-close:hover { color: #cdd6f4; }
  #provider-panel-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
  .pv-group { display: flex; flex-direction: column; gap: 4px; }
  .pv-group label { font-size: 12px; color: #a6adc8; }
  .pv-input { padding: 7px 10px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; font-size: 13px; outline: none; width: 100%; }
  .pv-input:focus { border-color: #89b4fa; }
  .pv-btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
  #pv-fetch-btn { background: #45475a; color: #cdd6f4; }
  #pv-fetch-btn:hover { background: #585b70; }
  #pv-apply-btn { background: #89b4fa; color: #1e1e2e; }
  #pv-apply-btn:hover { background: #74c7ec; }
  #pv-azure-btn { background: #45475a; color: #cdd6f4; }
  #pv-azure-btn:hover { background: #f38ba8; color: #1e1e2e; }
  .pv-actions { display: flex; gap: 8px; }
  .pv-check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #a6adc8; cursor: pointer; }
  #pv-current { font-size: 11px; color: #6c7086; border-top: 1px solid #313244; padding-top: 10px; }
  #pv-status { font-size: 12px; min-height: 18px; }
  .pv-ok  { color: #a6e3a1; }
  .pv-err { color: #f38ba8; }
  /* ---- タスクパネル ---- */
  #todo-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; position: relative; }
  #todo-btn:hover { background: #a6e3a1; color: #1e1e2e; }
  #todo-badge { position: absolute; top: -4px; right: -4px; background: #fab387; color: #1e1e2e; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; font-weight: bold; display: none; align-items: center; justify-content: center; }
  #todo-panel { position: fixed; top: 44px; right: 0; width: 300px; height: calc(100vh - 44px); background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.2s ease; }
  #todo-panel.open { transform: translateX(0); }
  #todo-panel-header { padding: 12px 16px; border-bottom: 1px solid #313244; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #todo-panel-close { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  #todo-panel-close:hover { color: #cdd6f4; }
  #todo-list { padding: 12px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  #todo-empty { color: #6c7086; font-size: 13px; text-align: center; margin-top: 24px; }
  .todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-radius: 8px; font-size: 13px; line-height: 1.4; background: #1e1e2e; border: 1px solid #313244; }
  .todo-item.pending { opacity: 0.6; }
  .todo-item.in_progress { border-color: #89b4fa; background: #1a1a2e; }
  .todo-item.completed { opacity: 0.45; }
  .todo-item.failed { border-color: #f38ba8; background: #2a1a1e; }
  .todo-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .todo-text { flex: 1; }
  .todo-item.completed .todo-text { text-decoration: line-through; color: #6c7086; }
  .todo-item.in_progress .todo-text { color: #89b4fa; font-weight: bold; }
  .todo-item.failed .todo-text { color: #f38ba8; }
  #todo-footer { display: flex; gap: 6px; margin: 0 12px 12px; }
  #todo-clear-done-btn { flex: 1; padding: 6px; background: #313244; color: #6c7086; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #todo-clear-done-btn:hover { color: #a6e3a1; }
  #todo-clear-btn { flex: 1; padding: 6px; background: #313244; color: #6c7086; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #todo-clear-btn:hover { color: #f38ba8; }
  /* ---- ワークスペース掃除モーダル ---- */
  #cleanup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  #cleanup-overlay.open { display: flex; }
  #cleanup-modal { background: #1e1e2e; border: 1px solid #313244; border-radius: 12px; width: 500px; max-width: 94vw; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  #cleanup-modal-header { padding: 16px 20px 12px; border-bottom: 1px solid #313244; font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
  #cleanup-modal-body { padding: 12px 20px; overflow-y: auto; flex: 1; }
  #cleanup-modal-body .cleanup-summary { font-size: 13px; color: #6c7086; margin-bottom: 10px; }
  .cleanup-section-label { font-size: 11px; font-weight: bold; color: #6c7086; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 0 4px; border-bottom: 1px solid #313244; margin-bottom: 2px; }
  .cleanup-section-label:first-child { padding-top: 0; }
  .cleanup-empty { font-size: 12px; color: #45475a; padding: 6px 0 4px; font-style: italic; }
  .cleanup-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #181825; font-size: 13px; font-family: monospace; }
  .cleanup-item input[type=checkbox].cleanup-delete-check { accent-color: #f38ba8; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
  .cleanup-item input[type=checkbox].cleanup-protect-check { accent-color: #a6e3a1; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
  .cleanup-item input[type=checkbox]:disabled { cursor: not-allowed; opacity: 0.4; }
  .cleanup-item .ci-icon { font-size: 14px; }
  .cleanup-item .ci-name { flex: 1; color: #cdd6f4; }
  .cleanup-item.is-always-protected .ci-name { color: #6c7086; }
  .cleanup-item .ci-size { color: #6c7086; font-size: 11px; white-space: nowrap; }
  .cleanup-item .ci-protect-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0 2px; opacity: 0.4; flex-shrink: 0; }
  .cleanup-item .ci-protect-btn:hover { opacity: 1; }
  #cleanup-modal-footer { padding: 12px 20px; border-top: 1px solid #313244; display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  #cleanup-cancel-btn { padding: 7px 16px; background: #313244; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #cleanup-cancel-btn:hover { background: #45475a; }
  #cleanup-exec-btn { padding: 7px 16px; background: #f38ba8; color: #1e1e2e; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
  #cleanup-exec-btn:hover { background: #eb6f8e; }
  #cleanup-exec-btn:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }
  #cleanup-confirm-msg { font-size: 12px; color: #f38ba8; display: none; }
  /* ---- セッション履歴パネル ---- */
  #sessions-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #sessions-btn:hover { background: #89dceb; color: #1e1e2e; }
  #sessions-panel { position: fixed; top: 44px; left: 0; width: 340px; height: calc(100vh - 44px); background: #181825; border-right: 1px solid #313244; display: flex; flex-direction: column; z-index: 100; transform: translateX(-100%); transition: transform 0.2s ease; }
  #sessions-panel.open { transform: translateX(0); }
  #sessions-panel-header { padding: 12px 16px; border-bottom: 1px solid #313244; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #sessions-panel-close { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  #sessions-panel-close:hover { color: #cdd6f4; }
  #sessions-list-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #sessions-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
  #sessions-empty { padding: 24px 16px; text-align: center; color: #6c7086; font-size: 13px; }
  .sess-item { display: flex; align-items: center; border-radius: 8px; margin-bottom: 3px; border: 1px solid transparent; overflow: hidden; }
  .sess-item:hover { background: #313244; border-color: #45475a; }
  .sess-item-body { flex: 1; padding: 9px 10px; cursor: pointer; min-width: 0; }
  .sess-title { font-size: 13px; color: #cdd6f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sess-meta { font-size: 11px; color: #6c7086; margin-top: 2px; }

<script>
  // ---- marked + highlight.js 設定 ----
  // marked v5+ では highlight オプション廃止 → hljs.highlightElement を手動適用
  marked.setOptions({ breaks: true, gfm: true });

  function renderMarkdown(text) {
    const html = marked.parse(text);
    const div = document.createElement('div');
    div.innerHTML = html;
    // シンタックスハイライト適用
    div.querySelectorAll('pre code').forEach(block => {
      hljs.highlightElement(block);
    });
    // 各コードブロックにヘッダー＋コピーボタンを追加（onclick はイベント委譲で処理）
    div.querySelectorAll('pre').forEach(pre => {
      const code = pre.querySelector('code');
      const lang = (code?.result?.language) || (code?.className.match(/language-(\w+)/) || [])[1] || '';
      pre.insertAdjacentHTML('afterbegin',
        `<div class="code-header"><span>${lang}</span><button class="copy-btn">コピー</button></div>`);
    });
    return div.innerHTML;
  }

  function setAiContent(el, text) {
    el.innerHTML = renderMarkdown(text);
  }

  // ---- スピナー＋状態表示 ----
  function createStatusLine(parent) {
    const el = document.createElement('div');
    el.className = 'status-line';
    el.innerHTML = '<div class="spinner"></div><span class="status-text">Thinking...</span>';
    parent.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return el;
  }

  function updateStatusLine(el, text) {
    if (!el || !el.isConnected) return;
    el.querySelector('.status-text').textContent = text;
    chat.scrollTop = chat.scrollHeight;
  }

  function getToolStatusText(name, args) {
    const path = args?.path || args?.filename || '';
    const short = path.split('/').pop();
    switch (name) {
      case 'read_file':    return `Reading ${short || path}`;
      case 'write_file':   return `Writing ${short || path}`;
      case 'edit_file':    return `Editing ${short || path}`;
      case 'list_files':   return `Listing ${path || 'files'}`;
      case 'glob_files':   return `Searching files (${args?.pattern || ''})`;
      case 'grep':         return `Searching "${args?.pattern || ''}"`;
      case 'run_command':  return `Running: ${(args?.command || '').slice(0, 40)}`;
      case 'web_search':   return `Searching "${(args?.query || '').slice(0, 40)}"`;
      case 'web_fetch':    return `Fetching ${(args?.url || '').slice(0, 40)}`;
      case 'web_research': return `Researching "${(args?.query || '').slice(0, 40)}"`;
      case 'code_lint':    return `Linting ${short || path}`;
      case 'todo_update':  return `Updating tasks`;
      case 'todo_read':    return `Reading tasks`;
      default:             return `Running ${name}`;
    }
  }

  // ---- 設定 ----
  const MAX_VISIBLE_TURNS = 5;   // これより古いターンは折りたたむ
  const MAX_API_MESSAGES  = 20;  // APIに送る最大メッセージ数 (= 10ターン分)
  const STORAGE_KEY = 'ai-codeagent-history';

  // ---- 状態 ----
  let history = [];   // API送信用 [{role, content}, ...]
  let turns   = [];   // 表示ターン管理 [{el, userText, aiText}, ...]
  let tokenSession = { prompt: 0, completion: 0, total: 0 };  // セッション累計トークン
  let pendingImages = [];  // 送信待ち画像 [{data, mime, url}, ...]
  let abortController = null;  // 生成中断用
  let genStartTime = 0, genTimer = null, genTokenChars = 0, genPhase = 'thinking', genHasActualUsage = false;

  const chat  = document.getElementById('chat');
  const input = document.getElementById('input');
  const send  = document.getElementById('send');
  const stopBtn = document.getElementById('stop');

  // コピーボタンのイベント委譲（innerHTML 再設定後もハンドラが生きる）
  chat.addEventListener('click', e => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const code = btn.closest('pre')?.querySelector('code');
    if (!code) return;
    const text = code.innerText;
    const done = () => {
      btn.textContent = '✓ コピー済み';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(done);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      done();
    }
  });

  function updateGenStatus() {
    const el = document.getElementById('gen-status');
    if (!el) return;
    const secs = Math.floor((Date.now() - genStartTime) / 1000);
    const tokens = Math.ceil(genTokenChars / 3);
    el.textContent = `${secs}s · ↓ ${tokens} tokens`;
  }

  function setGenerating(flag) {
    send.style.display    = flag ? 'none' : '';
    stopBtn.style.display = flag ? 'inline-block' : 'none';
    send.disabled = flag;
    const el = document.getElementById('gen-status');
    if (flag) {
      genStartTime = Date.now(); genTokenChars = 0; genPhase = 'thinking'; genHasActualUsage = false;
      el.style.display = 'block';
      updateGenStatus();
      genTimer = setInterval(updateGenStatus, 500);
    } else {
      clearInterval(genTimer); genTimer = null;
      // token_usage で実際の値が更新済みならそちらを優先
      if (!genHasActualUsage) {
        const secs = Math.floor((Date.now() - genStartTime) / 1000);
        const tokens = Math.ceil(genTokenChars / 3);
        el.textContent = `${secs}s · ↓ ${tokens} tokens`;
      }
    }
  }

  // ---- /no_think トグル ----
  function isNoThinkActive() {
    return localStorage.getItem('noThink') === 'true';
  }
  function saveNoThink() {
    const checked = document.getElementById('pv-no-think').checked;
    localStorage.setItem('noThink', checked);
  }
  function loadNoThink() {
    document.getElementById('pv-no-think').checked = isNoThinkActive();
  }

  // ---- 承認バイパストグル ----
  function isBypassActive() {
    return localStorage.getItem('bypassApproval') === 'true';
  }
  function toggleBypass() {
    const next = !isBypassActive();
    localStorage.setItem('bypassApproval', next);
    updateBypassBtn();
  }
  function updateBypassBtn() {
    const btn = document.getElementById('bypass-btn');
    if (!btn) return;
    if (isBypassActive()) {
      btn.textContent = '🔓 承認';
      btn.classList.add('active');
      btn.title = '承認バイパス: ON（確認なしで即実行）';
    } else {
      btn.textContent = '🔒 承認';
      btn.classList.remove('active');
      btn.title = '承認バイパス: OFF（変更・実装前に確認あり）';
    }
  }
  // 初期化
  updateBypassBtn();
  loadNoThink();

  function stopGeneration() {
    if (abortController) abortController.abort();
  }

  // ---- スキルオートコンプリート ----
  let _skills = null;
  let _skillActiveIdx = -1;

  async function _fetchSkills() {
    if (_skills !== null) return _skills;
    try {
      const res = await fetch('/skills');
      _skills = await res.json();
    } catch { _skills = []; }
    return _skills;
  }

  function _skillPopupClose() {
    document.getElementById('skill-popup').style.display = 'none';
    _skillActiveIdx = -1;
  }

  function _skillPopupShow(items, query) {
    const popup = document.getElementById('skill-popup');
    const filtered = items.filter(s => s.trigger.startsWith('/' + query));
    if (!filtered.length) { _skillPopupClose(); return; }
    popup.innerHTML = filtered.map((s, i) =>
      `<div class="skill-item" data-trigger="${s.trigger}" onclick="_skillSelect('${s.trigger}')">
        <span class="skill-trigger">${s.trigger}</span>
        <span class="skill-desc">${s.description}</span>
      </div>`
    ).join('');
    _skillActiveIdx = -1;
    popup.style.display = 'block';
  }

  function _skillSelect(trigger) {
    const val = input.value;
    const slashPos = val.lastIndexOf('/');
    input.value = val.substring(0, slashPos) + trigger + ' ';
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
    _skillPopupClose();
    input.focus();
  }

  input.addEventListener('keydown', e => {
    const popup = document.getElementById('skill-popup');
    if (popup.style.display !== 'none') {
      const items = popup.querySelectorAll('.skill-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _skillActiveIdx = Math.min(_skillActiveIdx + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === _skillActiveIdx));
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        _skillActiveIdx = Math.max(_skillActiveIdx - 1, 0);
        items.forEach((el, i) => el.classList.toggle('active', i === _skillActiveIdx));
        return;
      }
      if (e.key === 'Tab' || (e.key === 'Enter' && _skillActiveIdx >= 0)) {
        e.preventDefault();
        const active = popup.querySelector('.skill-item.active') || popup.querySelector('.skill-item');
        if (active) _skillSelect(active.dataset.trigger);
        return;
      }
      if (e.key === 'Escape') { _skillPopupClose(); return; }
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener('input', async () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
    const val = input.value;
    const slashPos = val.lastIndexOf('/');
    if (slashPos !== -1 && (slashPos === 0 || /\s/.test(val[slashPos - 1]))) {
      const query = val.substring(slashPos + 1);
      if (!/\s/.test(query)) {
        const skills = await _fetchSkills();
        _skillPopupShow(skills, query);
        return;
      }
    }
    _skillPopupClose();
  });

  // ---- 画像添付 ----
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        resolve({ data: base64, mime: file.type, url: dataUrl });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleFileSelect(event) {
    for (const file of event.target.files) {
      if (!file.type.startsWith('image/')) continue;
      const img = await fileToBase64(file);
      pendingImages.push(img);
      addImagePreview(img);
    }
    event.target.value = '';
  }

  function addImagePreview(img) {
    const area = document.getElementById('image-preview-area');
    const wrap = document.createElement('div');
    wrap.className = 'img-preview';
    const imgEl = document.createElement('img');
    imgEl.src = img.url;
    const del = document.createElement('button');
    del.className = 'img-preview-del';
    del.textContent = '×';
    del.onclick = () => {
      pendingImages = pendingImages.filter(i => i !== img);
      wrap.remove();
    };
    wrap.appendChild(imgEl);
    wrap.appendChild(del);
    area.appendChild(wrap);
  }

  // Ctrl+V でクリップボードから画像をペースト
  document.addEventListener('paste', async e => {
    const items = e.clipboardData?.items || [];
    for (const item of items) {
      if (!item.type.startsWith('image/')) continue;
      const file = item.getAsFile();
      if (!file) continue;
      const img = await fileToBase64(file);
      pendingImages.push(img);
      addImagePreview(img);
    }
  });

  // ---- ツールアイコン ----
  const TOOL_ICONS = {

  // ---- ユーティリティ ----
  function stripThink(text) {
    if (!text) return text;
    return text.replace(/<think>[\s\S]*?<\/think>\n*/g, '').replace(/<think>[\s\S]*/g, '');
  }

  // ---- セッションID管理 ----
  const SESSION_ID_KEY = 'ai-codeagent-session-id';

  function getOrCreateSessionId() {
    let id = localStorage.getItem(SESSION_ID_KEY);
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem(SESSION_ID_KEY, id);
    }
    return id;
  }

  async function autoSaveSession() {
    if (history.length === 0) return;
    const sessionId = getOrCreateSessionId();
    try {
      await fetch('/sessions/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          session_id: sessionId,
          history,
          turn_models: turns.map(t => t.modelName || null),
        }),
      });
    } catch(e) { console.warn('session save failed:', e); }
  }

  // ---- localStorage ----
  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        history,
        turnModels: turns.map(t => t.modelName || null),
        saved: new Date().toISOString(),
      }));
    } catch(e) { console.warn('localStorage 保存失敗:', e); }
    autoSaveSession();
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (!Array.isArray(data.history) || data.history.length === 0) return;
      history = data.history;
      const savedModels = Array.isArray(data.turnModels) ? data.turnModels : [];
      // UI再構築: user を起点に、次の user までの間で最後の assistant(content付き) を探す
      // ツール呼び出しがあると [user, assistant(tool_calls), tool, ..., assistant(最終)] になるため
      // i += 2 のペア方式では最終回答が取れない
      let i = 0;
      let turnIdx = 0;
      while (i < history.length) {
        const u = history[i];
        if (u?.role !== 'user') { i++; continue; }
        // 次の user が来るまでスキャンして最後の assistant content を取得
        let aiText = '';
        let j = i + 1;
        while (j < history.length && history[j]?.role !== 'user') {
          if (history[j]?.role === 'assistant' && history[j]?.content) {
            aiText = history[j].content;
          }
          j++;
        }
        const modelName = savedModels[turnIdx] || null;
        const turnEl = createTurnEl();
        appendMsg(turnEl, 'user', u.content);
        if (aiText) {
          const aiMsgEl = appendMsg(turnEl, 'ai', stripThink(aiText));
          if (modelName && aiMsgEl._labelEl) {
            aiMsgEl._labelEl.textContent = `Assistant (${modelName})`;
          }
        }
        turns.push({ el: turnEl, userText: u.content, aiText, modelName });
        turnIdx++;
        i = j;
      }
      foldOldTurns();
      updateTurnCount();
    } catch(e) { console.warn('履歴復元失敗:', e); }
  }

  function clearHistory() {
    if (!confirm('会話履歴をすべて削除しますか？')) return;
    history = [];
    turns   = [];
    tokenSession = { prompt: 0, completion: 0, total: 0 };
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(SESSION_ID_KEY); // 次回は新しいセッションIDを使用
    chat.innerHTML = '';
    updateTurnCount();
    updateTokenInfo(0, 0);
  }

  // ---- セッション履歴パネル ----
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleSessionsPanel() {

  async function loadSessionsList() {
    const listEl = document.getElementById('sessions-list');
    const emptyEl = document.getElementById('sessions-empty');
    listEl.innerHTML = '<div style="color:#6c7086;font-size:13px;padding:16px">読み込み中...</div>';
    emptyEl.style.display = 'none';
    try {
      const r = await fetch('/sessions');
      const sessions = await r.json();
      listEl.innerHTML = '';

          <button class="sess-del-btn" onclick="deleteSessionItem(event,'${escHtml(s.session_id)}',this)" title="削除">✕</button>

      listEl.innerHTML = '<div style="color:#f38ba8;font-size:12px;padding:16px">取得失敗: ' + escHtml(e.message) + '</div>';

  async function viewSession(sessionId) {
    // パネルを閉じる
    document.getElementById('sessions-panel').classList.remove('open');

    try {
      const r = await fetch('/sessions/' + encodeURIComponent(sessionId));
      const data = await r.json();
      if (data.error) throw new Error(data.error);

      // history・turns・トークンをリセットしてセッション内容で上書き
      history = data.history || [];
      turns = [];
      tokenSession = { prompt: 0, completion: 0, total: 0 };
      chat.innerHTML = '';

      // loadHistory() と同じロジックでUI再構築
      const savedModels = Array.isArray(data.turn_models) ? data.turn_models : [];
      let i = 0, turnIdx = 0;
      while (i < history.length) {
        const u = history[i];
        if (u?.role !== 'user') { i++; continue; }
        let aiText = '';
        let j = i + 1;
        while (j < history.length && history[j]?.role !== 'user') {
          if (history[j]?.role === 'assistant' && history[j]?.content) aiText = history[j].content;
          j++;
        }
        const modelName = savedModels[turnIdx] || null;
        const turnEl = createTurnEl();
        appendMsg(turnEl, 'user', u.content);
        if (aiText) {
          const aiMsgEl = appendMsg(turnEl, 'ai', stripThink(aiText));
          if (modelName && aiMsgEl._labelEl) aiMsgEl._labelEl.textContent = `Assistant (${modelName})`;
        }
        turns.push({ el: turnEl, userText: u.content, aiText, modelName });
        turnIdx++;
        i = j;
      }
      foldOldTurns();
      updateTurnCount();
      updateTokenInfo(0, 0);

      // セッションIDをこのセッションに切り替え → 続きから自動保存される
      localStorage.setItem(SESSION_ID_KEY, sessionId);
      saveHistory();

      // バナーに再開中セッション名を表示
      document.getElementById('session-banner-title').textContent = data.title || '無題';
      document.getElementById('session-banner').classList.add('visible');

      chat.scrollTop = chat.scrollHeight;
      document.getElementById('input').focus();
    } catch(e) {
      alert('セッションの読み込みに失敗しました: ' + e.message);
    }
  }

  function newSession() {

  function updateTokenInfo(lastPrompt, lastCompletion) {

      ` <span class="tok-total">(累計 ${fmt(tokenSession.total)})</span>`;

  // ---- DOM ヘルパー ----
  function createTurnEl() {
    const el = document.createElement('div');
    el.className = 'turn';
    chat.appendChild(el);
    return el;
  }

  function appendMsg(parent, cls, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${cls}-wrapper`;
    const label = document.createElement('div');
    label.className = 'msg-role-label';
    label.textContent = cls === 'user' ? 'You' : 'Assistant';
    wrapper.appendChild(label);
    const d = document.createElement('div');
    d.className = `msg ${cls}`;
    if (cls === 'ai' && text) {
      d.innerHTML = renderMarkdown(text);
    } else {
      d.textContent = text;
    }
    wrapper.appendChild(d);
    parent.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    d._labelEl = label;
    return d;
  }

  // ---- ツール説明の自動生成 ----
  function inferCommandDesc(command) {
    if (!command) return '';
    const c = command.trim();
    if (/^git push/.test(c))                          return 'GitLab へプッシュ';
    if (/^git commit/.test(c))                        return 'コミットを作成';
    if (/^git add/.test(c))                           return 'ファイルをステージング';
    if (/^git init/.test(c))                          return 'Git リポジトリを初期化';
    if (/^git remote add/.test(c))                    return 'リモートリポジトリを設定';
    if (/^git clone/.test(c))                         return 'リポジトリをクローン';
    if (/^git (status|log|diff)/.test(c))             return 'Git 状態を確認';
    if (/gitlab\.com\/api\/v4\/projects/.test(c) && /POST/.test(c)) return 'GitLab プロジェクトを作成';
    if (/gitlab\.com\/api\/v4/.test(c))               return 'GitLab API を呼び出し';
    if (/^curl/.test(c))                              return 'HTTP リクエストを送信';
    if (/^mkdir/.test(c))                             return 'ディレクトリを作成';
    if (/^(python3?|python)\s+\S+\.py/.test(c))       return 'Python スクリプトを実行';
    if (/^pip3?\s+install/.test(c))                   return 'パッケージをインストール';
    if (/^(ruff|black|flake8|mypy)/.test(c))          return 'コードをチェック';
    if (/^(ls|find)/.test(c))                         return 'ファイルを確認';
    if (/^(cp|mv)/.test(c))                           return 'ファイルを操作';
    const base = c.split(/\s+/)[0];
    return `${base} を実行`;
  }

  function getToolDescription(name, args) {
    // run_command: AI が description を付けた場合はそれを優先
    if (name === 'run_command') {
      return args.description || inferCommandDesc(args.command);
    }
    // その他ツールはツール名＋引数から自動生成
    switch (name) {
      case 'write_file':  return `${args.path} を書き込み`;
      case 'read_file':   return `${args.path} を読み込み`;
      case 'list_files':  return `${args.path || '.'} のファイル一覧を取得`;
      case 'web_search':    return `「${args.query}」を検索`;
      case 'web_fetch':     return `${args.url} を取得`;
      case 'web_research':  return `「${args.query}」を調査`;
      case 'code_lint':     return `${args.file_path || 'コード'} を静的解析`;
      default:              return '';
    }
  }

  // ---- diff レンダリング ----
  function isDiff(text) {
    return /^(diff --git|--- [ab]\/|\+\+\+ [ab]\/|@@\s+-\d)/m.test(text);
  }

  function renderDiff(container, text) {
    const block = document.createElement('div');
    block.className = 'diff-block';
    for (const line of text.split('\n')) {
      const span = document.createElement('span');
      if (line.startsWith('+') && !line.startsWith('+++'))      { span.className = 'diff-add'; }
      else if (line.startsWith('-') && !line.startsWith('---')) { span.className = 'diff-del'; }
      else if (line.startsWith('@@'))                           { span.className = 'diff-hunk'; }
      else if (line.startsWith('diff ') || line.startsWith('index ') || line.startsWith('--- ') || line.startsWith('+++ ')) {
        span.className = 'diff-meta';
      }
      span.textContent = line;
      block.appendChild(span);
    }
    container.appendChild(block);
  }

  function setResult(el, toolName, resultText) {
    const showPre = text => {
      const pre = document.createElement('pre');
      pre.style.cssText = 'margin:0;white-space:pre-wrap;word-break:break-all;';
      pre.textContent = text;
      el.appendChild(pre);
    };
    try {
      const parsed = JSON.parse(resultText);
      // プレーン文字列（list_files 等）
      if (typeof parsed === 'string') { showPre(parsed); return; }
      // オブジェクト形式
      const stdout = parsed.stdout || '';
      if (isDiff(stdout)) { renderDiff(el, stdout); return; }
      const text = parsed.result ?? parsed.output ?? parsed.content ?? stdout;
      if (typeof text === 'string') { showPre(text); return; }
    } catch(_) {}
    // JSON でない通常テキスト
    showPre(resultText);
  }

  function addToolBlock(parent, name, args) {
    const icon = TOOL_ICONS[name] || '🔧';
    const desc = getToolDescription(name, args);
    const d = document.createElement('div');
    d.className = 'tool-block';
    const resultId = `r-${name}-${Date.now()}`;
    // args から description フィールドは表示しない（冗長なので）
    const displayArgs = { ...args };
    delete displayArgs.description;
    d.innerHTML = `<div class="label">${icon} ${name}</div>`
      + (desc ? `<div class="tool-desc">▶ ${desc}</div>` : '')
      + `<details><summary style="color:#a6e3a1;cursor:pointer;font-size:12px">結果を展開</summary><div class="args">${JSON.stringify(displayArgs)}</div><div class="result" id="${resultId}"></div></details>`;
    parent.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d.querySelector('.result');
  }

  // ---- 折りたたみ ----
  function foldOldTurns() {
    // 既存の折りたたみブロックを除去
    const existing = chat.querySelector('.folded-turns');
    if (existing) {
      // 中のターンを chat に戻す
      const inner = existing.querySelector('.folded-inner');
      if (inner) {
        [...inner.children].forEach(c => chat.insertBefore(c, existing));
      }
      existing.remove();
    }

    if (turns.length <= MAX_VISIBLE_TURNS) return;

    const toFold = turns.slice(0, turns.length - MAX_VISIBLE_TURNS);
    const details = document.createElement('details');
    details.className = 'folded-turns';

    const summary = document.createElement('summary');
    summary.textContent = `過去 ${toFold.length} ターンの会話`;
    details.appendChild(summary);

    const inner = document.createElement('div');
    inner.className = 'folded-inner';
    toFold.forEach(t => inner.appendChild(t.el));
    details.appendChild(inner);

    chat.insertBefore(details, chat.firstChild);
  }

  function updateTurnCount() {
    const el = document.getElementById('turn-count');
    el.textContent = turns.length > 0 ? `${turns.length} ターン` : '';
  }

  // ---- タスクパネル ----
  let todoPanelOpen = false;
  let currentTodos = [];

  function toggleTodoPanel() {
    const panel = document.getElementById('todo-panel');
    todoPanelOpen = !todoPanelOpen;
    panel.classList.toggle('open', todoPanelOpen);
  }

  function renderTodos(todos) {
    currentTodos = todos;
    const listEl = document.getElementById('todo-list');
    const emptyEl = document.getElementById('todo-empty');
    if (!todos || todos.length === 0) {
      emptyEl.style.display = '';
      listEl.querySelectorAll('.todo-item').forEach(el => el.remove());
      updateTodoBadge(0);
      return;
    }
    emptyEl.style.display = 'none';
    listEl.querySelectorAll('.todo-item').forEach(el => el.remove());
    const icons = { pending: '⬜', in_progress: '🔄', completed: '✅', failed: '❌' };
    for (const t of todos) {
      const el = document.createElement('div');
      el.className = `todo-item ${t.status}`;
      el.innerHTML = `<span class="todo-icon">${icons[t.status] || '⬜'}</span><span class="todo-text">${escHtml(t.content)}</span>`;
      listEl.appendChild(el);
    }
    const inProgress = todos.filter(t => t.status === 'in_progress').length;
    const pending = todos.filter(t => t.status === 'pending').length;
    const failed = todos.filter(t => t.status === 'failed').length;
    updateTodoBadge(inProgress + pending + failed);
  }

  function updateTodoBadge(count) {
    const badge = document.getElementById('todo-badge');
    if (count > 0) {
      badge.textContent = count;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function clearDoneTodos() {
    currentTodos = currentTodos.filter(t => t.status !== 'completed' && t.status !== 'failed');
    renderTodos(currentTodos);
  }

  function clearTodos() {
    currentTodos = [];
    renderTodos([]);
  }

  // ---- ワークスペース掃除モーダル ----
  let cleanupConfirmStep = 0;  // 0=初回, 1=二次確認待ち

  async function openCleanupDirect() {
    const btn = document.getElementById('cleanup-btn');
    btn.textContent = '⏳';
    try {
      const res = await fetch('/workspace/cleanup-preview');
      const data = await res.json();

      btn.textContent = '🧹';
