<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Azure Code Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 10px 20px; background: #181825; border-bottom: 1px solid #313244; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  #header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  #turn-count { font-size: 11px; color: #6c7086; font-weight: normal; }
  #clear-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #clear-btn:hover { background: #f38ba8; color: #1e1e2e; }
  #gitlab-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; display: none; }
  #gitlab-btn:hover { background: #fab387; color: #1e1e2e; }
  #gitlab-panel { position: fixed; top: 44px; right: 0; width: 340px; height: calc(100vh - 44px); background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.2s ease; }
  #gitlab-panel.open { transform: translateX(0); }
  #gitlab-panel-header { padding: 12px 16px; border-bottom: 1px solid #313244; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #gitlab-panel-close { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  #gitlab-panel-close:hover { color: #cdd6f4; }
  #gitlab-search { margin: 10px 12px; padding: 6px 10px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; font-size: 13px; outline: none; width: calc(100% - 24px); flex-shrink: 0; }
  #gitlab-search:focus { border-color: #89b4fa; }
  #gitlab-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .gl-project { padding: 9px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; }
  .gl-project:hover { background: #313244; border-color: #45475a; }
  .gl-project-name { font-size: 13px; font-weight: bold; color: #cdd6f4; }
  .gl-project-ns { font-size: 11px; color: #6c7086; margin-top: 1px; }
  .gl-project-desc { font-size: 11px; color: #a6adc8; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gl-project-meta { font-size: 10px; color: #45475a; margin-top: 4px; display: flex; gap: 8px; align-items: center; }
  .gl-badge { padding: 1px 5px; border-radius: 3px; background: #313244; color: #6c7086; }
  #gitlab-status { padding: 24px 16px; text-align: center; color: #6c7086; font-size: 13px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 0; }
  .turn { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; }
  .ai { align-self: flex-start; background: #313244; }
  .tool-block { align-self: flex-start; background: #1e1e2e; border: 1px solid #45475a; border-radius: 8px; padding: 8px 12px; font-family: monospace; font-size: 13px; max-width: 80%; }
  .tool-block .label { color: #a6e3a1; font-size: 11px; margin-bottom: 2px; }
  .tool-block .tool-desc { color: #cba6f7; font-size: 12px; margin-bottom: 4px; font-style: italic; }
  .tool-block .args { color: #fab387; }
  .tool-block .result { color: #cdd6f4; margin-top: 4px; max-height: 120px; overflow-y: auto; }
  .diff-block { font-family: monospace; font-size: 12px; line-height: 1.5; }
  .diff-add  { color: #a6e3a1; background: rgba(166,227,161,0.08); display: block; }
  .diff-del  { color: #f38ba8; background: rgba(243,139,168,0.08); display: block; }
  .diff-hunk { color: #89dceb; display: block; }
  .diff-meta { color: #6c7086; display: block; }
  .folded-turns { margin-bottom: 12px; }
  .folded-turns > summary {
    list-style: none; cursor: pointer; padding: 6px 14px;
    color: #6c7086; font-size: 12px;
    border: 1px dashed #313244; border-radius: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .folded-turns > summary:hover { background: #181825; color: #cdd6f4; }
  .folded-turns[open] > summary { color: #cdd6f4; margin-bottom: 8px; }
  .folded-turns > summary::before { content: '▸'; transition: transform 0.2s; }
  .folded-turns[open] > summary::before { content: '▾'; }
  .folded-inner { display: flex; flex-direction: column; gap: 0; }
  #input-area { display: flex; flex-direction: column; gap: 6px; padding: 10px 20px 12px; background: #181825; border-top: 1px solid #313244; }
  #input-row { display: flex; gap: 8px; align-items: center; }
  #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; font-size: 14px; outline: none; resize: none; line-height: 1.5; max-height: 200px; overflow-y: auto; }
  #input:focus { border-color: #89b4fa; }
  #attach-btn { padding: 10px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; line-height: 1; }
  #attach-btn:hover { background: #585b70; }
  #send { padding: 10px 20px; background: #89b4fa; color: #1e1e2e; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #stop { padding: 10px 20px; background: #f38ba8; color: #1e1e2e; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }
  #image-preview-area { display: flex; gap: 8px; flex-wrap: wrap; }
  .img-preview { position: relative; }
  .img-preview img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid #45475a; }
  .img-preview-del { position: absolute; top: -4px; right: -4px; background: #f38ba8; color: #1e1e2e; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; line-height: 16px; text-align: center; padding: 0; }
  .msg-img { max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 6px; display: block; }
  /* ---- プロバイダー設定 ---- */
  #provider-btn { padding: 4px 12px; background: #45475a; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #provider-btn:hover { background: #cba6f7; color: #1e1e2e; }
  #provider-label { font-size: 11px; color: #89b4fa; font-weight: normal; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #provider-panel { position: fixed; top: 44px; right: 0; width: 340px; height: calc(100vh - 44px); background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.2s ease; overflow-y: auto; }
  #provider-panel.open { transform: translateX(0); }
  #provider-panel-header { padding: 12px 16px; border-bottom: 1px solid #313244; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #provider-panel-close { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  #provider-panel-close:hover { color: #cdd6f4; }
  #provider-panel-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
  .pv-group { display: flex; flex-direction: column; gap: 4px; }
  .pv-group label { font-size: 12px; color: #a6adc8; }
  .pv-input { padding: 7px 10px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; font-size: 13px; outline: none; width: 100%; }
  .pv-input:focus { border-color: #89b4fa; }
  .pv-btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
  #pv-fetch-btn { background: #45475a; color: #cdd6f4; }
  #pv-fetch-btn:hover { background: #585b70; }
  #pv-apply-btn { background: #89b4fa; color: #1e1e2e; }
  #pv-apply-btn:hover { background: #74c7ec; }
  #pv-azure-btn { background: #45475a; color: #cdd6f4; }
  #pv-azure-btn:hover { background: #f38ba8; color: #1e1e2e; }
  .pv-actions { display: flex; gap: 8px; }
  .pv-check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #a6adc8; cursor: pointer; }
  #pv-current { font-size: 11px; color: #6c7086; border-top: 1px solid #313244; padding-top: 10px; }
  #pv-status { font-size: 12px; min-height: 18px; }
  .pv-ok  { color: #a6e3a1; }
  .pv-err { color: #f38ba8; }
</style>
</head>
<body>
<div id="header">
  🤖 Azure Code Agent
  <div id="header-right">
    <span id="turn-count"></span>
    <span id="provider-label"></span>
    <button id="provider-btn" onclick="toggleProviderPanel()">⚙️ LLM</button>
    <button id="gitlab-btn" onclick="toggleGitLabPanel()">🦊 GitLab</button>
    <button id="clear-btn" onclick="clearHistory()">履歴クリア</button>
  </div>
</div>

<!-- LLMプロバイダー設定パネル -->
<div id="provider-panel">
  <div id="provider-panel-header">
    ⚙️ LLMプロバイダー設定
    <button id="provider-panel-close" onclick="toggleProviderPanel()">✕</button>
  </div>
  <div id="provider-panel-body">
    <div class="pv-group">
      <label>エンドポイントURL</label>
      <input id="pv-url" class="pv-input" type="text" placeholder="http://192.168.x.x:1234" list="pv-url-history">
      <datalist id="pv-url-history"></datalist>
    </div>
    <div class="pv-group">
      <label>APIキー（任意）</label>
      <input id="pv-apikey" class="pv-input" type="password" placeholder="sk-... （LM Studioは不要）">
    </div>
    <button id="pv-fetch-btn" class="pv-btn" onclick="fetchProviderModels()">モデル一覧を取得</button>
    <div class="pv-group" id="pv-model-group" style="display:none">
      <label>モデル</label>
      <select id="pv-model" class="pv-input"></select>
    </div>
    <label class="pv-check">
      <input type="checkbox" id="pv-reset-history"> 切り替え時に履歴をリセット
    </label>
    <div id="pv-status"></div>
    <div class="pv-actions">
      <button id="pv-apply-btn" class="pv-btn" onclick="applyProviderConfig()">適用</button>
      <button id="pv-azure-btn" class="pv-btn" onclick="resetToAzure()">Azureに戻す</button>
    </div>
    <div id="pv-current"></div>
  </div>
</div>

<!-- GitLab プロジェクトパネル -->
<div id="gitlab-panel">
  <div id="gitlab-panel-header">
    🦊 GitLab プロジェクト
    <button id="gitlab-panel-close" onclick="toggleGitLabPanel()">✕</button>
  </div>
  <input id="gitlab-search" type="text" placeholder="プロジェクトを絞り込み..." oninput="filterProjects(this.value)></textarea>
  <div id="gitlab-list">
    <div id="gitlab-status">読み込み中...</div>
  </div>
</div>

<div id="chat"></div>
<div id="input-area">
  <div id="image-preview-area"></div>
  <div id="input-row">
    <textarea id="input" placeholder="指示を入力してください..." rows="1"></textarea>
    <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="画像を添付">📎</button>
    <input id="file-input" type="file" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)">
    <button id="send" onclick="sendMessage()">送信</button>
    <button id="stop" onclick="stopGeneration()">■ 停止</button>
  </div>
</div>

<script>
  // ---- 設定 ----
  const MAX_VISIBLE_TURNS = 5;   // これより古いターンは折りたたむ
  const MAX_API_MESSAGES  = 20;  // APIに送る最大メッセージ数 (= 10ターン分)
  const STORAGE_KEY = 'ai-codeagent-history';

  // ---- 状態 ----
  let history = [];   // API送信用 [{role, content}, ...]
  let turns   = [];   // 表示ターン管理 [{el, userText, aiText}, ...]
  let pendingImages = [];  // 送信待ち画像 [{data, mime, url}, ...]
  let abortController = null;  // 生成中断用

  const chat  = document.getElementById('chat');
  const input = document.getElementById('input');
  const send  = document.getElementById('send');
  const stopBtn = document.getElementById('stop');

  function setGenerating(flag) {
    send.style.display    = flag ? 'none' : '';
    stopBtn.style.display = flag ? 'inline-block' : 'none';
    send.disabled = flag;
  }

  function stopGeneration() {
    if (abortController) abortController.abort();
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; });

  // ---- 画像添付 ----
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        resolve({ data: base64, mime: file.type, url: dataUrl });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleFileSelect(event) {
    for (const file of event.target.files) {
      if (!file.type.startsWith('image/')) continue;
      const img = await fileToBase64(file);
      pendingImages.push(img);
      addImagePreview(img);
    }
    event.target.value = '';
  }

  function addImagePreview(img) {
    const area = document.getElementById('image-preview-area');
    const wrap = document.createElement('div');
    wrap.className = 'img-preview';
    const imgEl = document.createElement('img');
    imgEl.src = img.url;
    const del = document.createElement('button');
    del.className = 'img-preview-del';
    del.textContent = '×';
    del.onclick = () => {
      pendingImages = pendingImages.filter(i => i !== img);
      wrap.remove();
    };
    wrap.appendChild(imgEl);
    wrap.appendChild(del);
    area.appendChild(wrap);
  }

  // Ctrl+V でクリップボードから画像をペースト
  document.addEventListener('paste', async e => {
    const items = e.clipboardData?.items || [];
    for (const item of items) {
      if (!item.type.startsWith('image/')) continue;
      const file = item.getAsFile();
      if (!file) continue;
      const img = await fileToBase64(file);
      pendingImages.push(img);
      addImagePreview(img);
    }
  });

  // ---- ツールアイコン ----
  const TOOL_ICONS = {
    read_file: '📄', write_file: '✏️', list_files: '📁',
    run_command: '⚡', web_search: '🔍', web_fetch: '🌐', web_research: '🔭', code_lint: '🔬',
  };

  // ---- ユーティリティ ----
  function stripThink(text) {
    if (!text) return text;
    return text.replace(/<think>[\s\S]*?<\/think>\n*/g, '').replace(/<think>[\s\S]*/g, '');
  }

  // ---- localStorage ----
  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        history,
        saved: new Date().toISOString(),
      }));
    } catch(e) { console.warn('localStorage 保存失敗:', e); }
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (!Array.isArray(data.history) || data.history.length === 0) return;
      history = data.history;
      // UI再構築: user/assistant ペアで簡略表示
      for (let i = 0; i + 1 < history.length; i += 2) {
        const u = history[i], a = history[i + 1];
        if (u?.role === 'user' && a?.role === 'assistant') {
          const turnEl = createTurnEl();
          appendMsg(turnEl, 'user', u.content);
          appendMsg(turnEl, 'ai', stripThink(a.content));
          turns.push({ el: turnEl, userText: u.content, aiText: a.content });
        }
      }
      foldOldTurns();
      updateTurnCount();
    } catch(e) { console.warn('履歴復元失敗:', e); }
  }

  function clearHistory() {
    if (!confirm('会話履歴をすべて削除しますか？')) return;
    history = [];
    turns   = [];
    localStorage.removeItem(STORAGE_KEY);
    chat.innerHTML = '';
    updateTurnCount();
  }

  // ---- DOM ヘルパー ----
  function createTurnEl() {
    const el = document.createElement('div');
    el.className = 'turn';
    chat.appendChild(el);
    return el;
  }

  function appendMsg(parent, cls, text) {
    const d = document.createElement('div');
    d.className = `msg ${cls}`;
    d.textContent = text;
    parent.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  // ---- ツール説明の自動生成 ----
  function inferCommandDesc(command) {
    if (!command) return '';
    const c = command.trim();
    if (/^git push/.test(c))                          return 'GitLab へプッシュ';
    if (/^git commit/.test(c))                        return 'コミットを作成';
    if (/^git add/.test(c))                           return 'ファイルをステージング';
    if (/^git init/.test(c))                          return 'Git リポジトリを初期化';
    if (/^git remote add/.test(c))                    return 'リモートリポジトリを設定';
    if (/^git clone/.test(c))                         return 'リポジトリをクローン';
    if (/^git (status|log|diff)/.test(c))             return 'Git 状態を確認';
    if (/gitlab\.com\/api\/v4\/projects/.test(c) && /POST/.test(c)) return 'GitLab プロジェクトを作成';
    if (/gitlab\.com\/api\/v4/.test(c))               return 'GitLab API を呼び出し';
    if (/^curl/.test(c))                              return 'HTTP リクエストを送信';
    if (/^mkdir/.test(c))                             return 'ディレクトリを作成';
    if (/^(python3?|python)\s+\S+\.py/.test(c))       return 'Python スクリプトを実行';
    if (/^pip3?\s+install/.test(c))                   return 'パッケージをインストール';
    if (/^(ruff|black|flake8|mypy)/.test(c))          return 'コードをチェック';
    if (/^(ls|find)/.test(c))                         return 'ファイルを確認';
    if (/^(cp|mv)/.test(c))                           return 'ファイルを操作';
    const base = c.split(/\s+/)[0];
    return `${base} を実行`;
  }

  function getToolDescription(name, args) {
    // run_command: AI が description を付けた場合はそれを優先
    if (name === 'run_command') {
      return args.description || inferCommandDesc(args.command);
    }
    // その他ツールはツール名＋引数から自動生成
    switch (name) {
      case 'write_file':  return `${args.path} を書き込み`;
      case 'read_file':   return `${args.path} を読み込み`;
      case 'list_files':  return `${args.path || '.'} のファイル一覧を取得`;
      case 'web_search':    return `「${args.query}」を検索`;
      case 'web_fetch':     return `${args.url} を取得`;
      case 'web_research':  return `「${args.query}」を調査`;
      case 'code_lint':     return `${args.file_path || 'コード'} を静的解析`;
      default:              return '';
    }
  }

  // ---- diff レンダリング ----
  function isDiff(text) {
    return /^(diff --git|--- [ab]\/|\+\+\+ [ab]\/|@@\s+-\d)/m.test(text);
  }

  function renderDiff(container, text) {
    const block = document.createElement('div');
    block.className = 'diff-block';
    for (const line of text.split('\n')) {
      const span = document.createElement('span');
      if (line.startsWith('+') && !line.startsWith('+++'))      { span.className = 'diff-add'; }
      else if (line.startsWith('-') && !line.startsWith('---')) { span.className = 'diff-del'; }
      else if (line.startsWith('@@'))                           { span.className = 'diff-hunk'; }
      else if (line.startsWith('diff ') || line.startsWith('index ') || line.startsWith('--- ') || line.startsWith('+++ ')) {
        span.className = 'diff-meta';
      }
      span.textContent = line;
      block.appendChild(span);
    }
    container.appendChild(block);
  }

  function setResult(el, toolName, resultText) {
    // run_command / git diff 系は stdout を取り出して diff 判定
    try {
      const parsed = JSON.parse(resultText);
      const stdout = parsed.stdout || '';
      if (isDiff(stdout)) {
        renderDiff(el, stdout);
        return;
      }
    } catch(_) {}
    // 通常テキスト
    el.textContent = resultText;
  }

  function addToolBlock(parent, name, args) {
    const icon = TOOL_ICONS[name] || '🔧';
    const desc = getToolDescription(name, args);
    const d = document.createElement('div');
    d.className = 'tool-block';
    const resultId = `r-${name}-${Date.now()}`;
    // args から description フィールドは表示しない（冗長なので）
    const displayArgs = { ...args };
    delete displayArgs.description;
    d.innerHTML = `<div class="label">${icon} ${name}</div>`
      + (desc ? `<div class="tool-desc">▶ ${desc}</div>` : '')
      + `<details><summary style="color:#a6e3a1;cursor:pointer;font-size:12px">結果を展開</summary><div class="args">${JSON.stringify(displayArgs)}</div><div class="result" id="${resultId}"></div></details>`;
    parent.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d.querySelector('.result');
  }

  // ---- 折りたたみ ----
  function foldOldTurns() {
    // 既存の折りたたみブロックを除去
    const existing = chat.querySelector('.folded-turns');
    if (existing) {
      // 中のターンを chat に戻す
      const inner = existing.querySelector('.folded-inner');
      if (inner) {
        [...inner.children].forEach(c => chat.insertBefore(c, existing));
      }
      existing.remove();
    }

    if (turns.length <= MAX_VISIBLE_TURNS) return;

    const toFold = turns.slice(0, turns.length - MAX_VISIBLE_TURNS);
    const details = document.createElement('details');
    details.className = 'folded-turns';

    const summary = document.createElement('summary');
    summary.textContent = `過去 ${toFold.length} ターンの会話`;
    details.appendChild(summary);

    const inner = document.createElement('div');
    inner.className = 'folded-inner';
    toFold.forEach(t => inner.appendChild(t.el));
    details.appendChild(inner);

    chat.insertBefore(details, chat.firstChild);
  }

  function updateTurnCount() {
    const el = document.getElementById('turn-count');
    el.textContent = turns.length > 0 ? `${turns.length} ターン` : '';
  }

  // ---- GitLab パネル ----
  let glProjects = [];
  let glPanelOpen = false;

  async function toggleGitLabPanel() {
    const panel = document.getElementById('gitlab-panel');
    glPanelOpen = !glPanelOpen;
    panel.classList.toggle('open', glPanelOpen);
    if (glPanelOpen && glProjects.length === 0) {
      await loadGitLabProjects();
    }
  }

  async function loadGitLabProjects() {
    const listEl = document.getElementById('gitlab-list');
    listEl.innerHTML = '<div id="gitlab-status">読み込み中...</div>';
    try {
      const res = await fetch('/gitlab/projects');
      const data = await res.json();
      if (data.error) {
        listEl.innerHTML = `<div id="gitlab-status">⚠️ ${data.error}</div>`;
        return;
      }
      glProjects = data;
      renderProjects(glProjects);
    } catch(e) {
      listEl.innerHTML = `<div id="gitlab-status">⚠️ 取得失敗: ${e.message}</div>`;
    }
  }

  function renderProjects(projects) {
    const listEl = document.getElementById('gitlab-list');
    if (projects.length === 0) {
      listEl.innerHTML = '<div id="gitlab-status">プロジェクトが見つかりません</div>';
      return;
    }
    listEl.innerHTML = '';
    for (const p of projects) {
      const el = document.createElement('div');
      el.className = 'gl-project';
      const ago = p.last_activity_at ? timeAgo(p.last_activity_at) : '';
      el.innerHTML =
        `<div class="gl-project-name">${escHtml(p.name)}</div>`
        + `<div class="gl-project-ns">${escHtml(p.path_with_namespace)}</div>`
        + (p.description ? `<div class="gl-project-desc">${escHtml(p.description)}</div>` : '')
        + `<div class="gl-project-meta">`
        + `<span class="gl-badge">${escHtml(p.visibility)}</span>`
        + (ago ? `<span>${ago}</span>` : '')
        + `</div>`;
      el.onclick = () => selectProject(p);
      listEl.appendChild(el);
    }
  }

  function filterProjects(query) {
    const q = query.toLowerCase();
    const filtered = q
      ? glProjects.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.path_with_namespace.toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q))
      : glProjects;
    renderProjects(filtered);
  }

  function selectProject(p) {
    // クローンメッセージを入力欄にセットしてパネルを閉じる
    input.value = `${p.path_with_namespace} を workspace にクローンして: ${p.web_url}`;
    input.focus();
    toggleGitLabPanel();
  }

  function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return '今日';
    if (days === 1) return '昨日';
    if (days < 30)  return `${days}日前`;
    if (days < 365) return `${Math.floor(days / 30)}ヶ月前`;
    return `${Math.floor(days / 365)}年前`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // GitLab 設定チェック → ボタン表示
  fetch('/gitlab/projects').then(r => r.json()).then(data => {
    if (!data.error) document.getElementById('gitlab-btn').style.display = 'inline-block';
  }).catch(() => {});

  // ---- プロバイダー設定パネル ----
  let pvPanelOpen = false;
  const PV_URL_HISTORY_KEY = 'pv_url_history';

  function pvUrlHistoryLoad() {
    try { return JSON.parse(localStorage.getItem(PV_URL_HISTORY_KEY) || '[]'); } catch { return []; }
  }

  function pvUrlHistorySave(url) {
    if (!url) return;
    const list = pvUrlHistoryLoad().filter(u => u !== url);
    list.unshift(url);
    localStorage.setItem(PV_URL_HISTORY_KEY, JSON.stringify(list.slice(0, 5)));
  }

  function pvUrlHistoryRender() {
    const dl = document.getElementById('pv-url-history');
    if (!dl) return;
    dl.innerHTML = pvUrlHistoryLoad().map(u => `<option value="${escHtml(u)}">`).join('');
  }

  async function toggleProviderPanel() {
    pvPanelOpen = !pvPanelOpen;
    document.getElementById('provider-panel').classList.toggle('open', pvPanelOpen);
    if (pvPanelOpen) { await loadCurrentProvider(); pvUrlHistoryRender(); }
  }

  async function loadCurrentProvider() {
    try {
      const res = await fetch('/providers/current');
      const data = await res.json();
      if (data.type === 'azure') {
        document.getElementById('pv-url').value = data.url || '';
        document.getElementById('pv-apikey').value = '';
      } else {
        // openai_compatible: URLは /v1 を除いて表示
        const base = (data.url || '').replace(/\/v1$/, '');
        document.getElementById('pv-url').value = base;
        document.getElementById('pv-apikey').value = '';
        // 現在設定済みのURLを履歴に自動追加（過去の適用分も補完に出るようにする）
        if (base) { pvUrlHistorySave(base); pvUrlHistoryRender(); }
      }
      updatePvCurrent(data);
    } catch(e) {}
  }

  function updatePvCurrent(data) {
    document.getElementById('pv-current').textContent =
      `現在: ${data.type === 'azure' ? 'Azure' : 'OpenAI互換'} / ${data.model || '(未設定)'}`;
    document.getElementById('provider-label').textContent =
      `${data.type === 'azure' ? '🔵' : '🟢'} ${shortModel(data.model)}`;
  }

  function shortModel(name) {
    if (!name) return '';
    return name.length > 20 ? name.slice(0, 20) + '…' : name;
  }

  async function fetchProviderModels() {
    const url = document.getElementById('pv-url').value.trim();
    const apikey = document.getElementById('pv-apikey').value.trim();
    if (!url) { setPvStatus('URLを入力してください', false); return; }
    setPvStatus('取得中...', null);
    try {
      const params = new URLSearchParams({ url });
      if (apikey) params.set('api_key', apikey);
      const res = await fetch('/providers/models?' + params);
      const data = await res.json();
      if (data.error) { setPvStatus('⚠️ ' + data.error, false); return; }
      const sel = document.getElementById('pv-model');
      sel.innerHTML = data.models.map(m => `<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
      document.getElementById('pv-model-group').style.display = 'flex';
      setPvStatus(`✓ ${data.models.length} モデルを取得`, true);
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  async function applyProviderConfig() {
    const url = document.getElementById('pv-url').value.trim();
    const apikey = document.getElementById('pv-apikey').value.trim();
    const modelSel = document.getElementById('pv-model');
    const model = modelSel.value || modelSel.options[0]?.value || '';
    if (!url) { setPvStatus('URLを入力してください', false); return; }
    if (!model) { setPvStatus('モデルを選択してください', false); return; }
    try {
      const res = await fetch('/providers/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, api_key: apikey, model }),
      });
      const data = await res.json();
      if (data.status !== 'ok') { setPvStatus('⚠️ 設定失敗', false); return; }
      pvUrlHistorySave(url);
      pvUrlHistoryRender();
      updatePvCurrent(data.provider);
      setPvStatus('✓ 適用しました', true);
      if (document.getElementById('pv-reset-history').checked) {
        history = []; turns = []; localStorage.removeItem(STORAGE_KEY);
        chat.innerHTML = ''; updateTurnCount();
      }
      setTimeout(() => toggleProviderPanel(), 800);
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  async function resetToAzure() {
    try {
      const res = await fetch('/providers/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: '', api_key: '', model: '' }),
      });
      const data = await res.json();
      updatePvCurrent(data.provider);
      document.getElementById('pv-model-group').style.display = 'none';
      await loadCurrentProvider();
      setPvStatus('✓ Azureに戻しました', true);
      if (document.getElementById('pv-reset-history').checked) {
        history = []; turns = []; localStorage.removeItem(STORAGE_KEY);
        chat.innerHTML = ''; updateTurnCount();
      }
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  function setPvStatus(msg, ok) {
    const el = document.getElementById('pv-status');
    el.textContent = msg;
    el.className = 'pv-status ' + (ok === true ? 'pv-ok' : ok === false ? 'pv-err' : '');
  }

  // 起動時にプロバイダーラベルを更新
  fetch('/providers/current').then(r => r.json()).then(data => {
    updatePvCurrent(data);
  }).catch(() => {});

  // ---- 送信 ----
  async function sendMessage() {
    const text = input.value.trim();
    if (!text && pendingImages.length === 0) return;
    input.value = '';
    input.style.height = 'auto';
    abortController = new AbortController();
    setGenerating(true);

    // 送信する画像を確定してプレビューエリアをクリア
    const imagesToSend = [...pendingImages];
    pendingImages = [];
    document.getElementById('image-preview-area').innerHTML = '';

    // 新しいターンを開始
    const turnEl = createTurnEl();
    const userMsgEl = appendMsg(turnEl, 'user', text || '(画像)');
    // 添付画像をユーザーメッセージ内に表示
    imagesToSend.forEach(img => {
      const imgEl = document.createElement('img');
      imgEl.src = img.url;
      imgEl.className = 'msg-img';
      userMsgEl.appendChild(imgEl);
    });
    const aiMsg = appendMsg(turnEl, 'ai', '考え中...');
    let currentResultEl = null;
    let currentToolName = null;
    let finalAnswer = '';
    let turnMessages = [];  // tool含む完全なメッセージリスト

    // API履歴は最新 MAX_API_MESSAGES 件のみ送信
    const trimmedHistory = history.slice(-MAX_API_MESSAGES);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify({
          message: text || '(添付画像について教えてください)',
          history: trimmedHistory,
          images: imagesToSend.map(i => ({ data: i.data, mime: i.mime })),
        }),
      });

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        buf += decoder.decode(value ?? new Uint8Array(), { stream: !done });
        if (done) {
          // done時もbufに残ったデータを処理する（最終チャンク取りこぼし防止）
          if (buf.trim()) {
            for (const line of buf.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              try {
                const data = JSON.parse(line.slice(6));
                if (data.type === 'answer_chunk') {
                  if (aiMsg.textContent === '考え中...') aiMsg.textContent = '';
                  finalAnswer += data.content;
                  aiMsg.textContent = stripThink(finalAnswer);
                } else if (data.type === 'history_messages') {
                  turnMessages = data.messages;
                }
              } catch { /* ignore */ }
            }
          }
          break;
        }
        // 完結した行のみ処理（末尾の不完全な行はバッファに残す）
        const parts = buf.split('\n');
        buf = parts.pop(); // 最後の（未完の可能性がある）行を残す
        const lines = parts;
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }
          if (data.type === 'tool_start') {
            aiMsg.textContent = '';
            finalAnswer = '';
            currentToolName = data.name;
            currentResultEl = addToolBlock(turnEl, data.name, data.args);
          } else if (data.type === 'tool_result') {
            if (currentResultEl) setResult(currentResultEl, currentToolName, data.result);
          } else if (data.type === 'answer_chunk') {
            if (aiMsg.textContent === '考え中...') aiMsg.textContent = '';
            finalAnswer += data.content;
            // <think>...</think> を非表示（Qwen CoT）
            aiMsg.textContent = stripThink(finalAnswer);
          } else if (data.type === 'history_messages') {
            turnMessages = data.messages;
          } else if (data.type === 'answer_done') {
            // ストリーム完了 (何もしない)
          } else if (data.type === 'answer') {
            // フォールバック (後方互換)
            finalAnswer = data.content;
            aiMsg.textContent = data.content;
          }
        }
      }
    } catch(e) {
      if (e.name === 'AbortError') {
        if (aiMsg.textContent === '考え中...') aiMsg.textContent = '';
        aiMsg.textContent += ' [停止]';
      } else {
        aiMsg.textContent = `エラー: ${e.message}`;
      }
    } finally {
      abortController = null;
      setGenerating(false);
      input.focus();
    }

    // 履歴・ターン更新 (tool メッセージを含む完全な履歴を保持)
    history.push({ role: 'user', content: text });
    if (turnMessages.length > 0) {
      turnMessages.forEach(m => history.push(m));
    } else {
      history.push({ role: 'assistant', content: finalAnswer });
    }
    turns.push({ el: turnEl, userText: text, aiText: finalAnswer });

    foldOldTurns();
    updateTurnCount();
    saveHistory();
  }

  // ---- 起動時復元 ----
  loadHistory();
</script>
</body>
