use_default_settings: true

server:
  secret_key: "ai-codeagent-secret"
  bind_address: "0.0.0.0"
  port: 8080

search:
  safe_search: 0
  default_lang: "ja"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: yahoo
    engine: yahoo
    disabled: false
  - name: brave
    engine: brave
    disabled: false
  - name: qwant
    engine: qwant
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false
    language: ja
