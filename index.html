  const ALWAYS_PROTECTED_NAMES = new Set(['.git', '.protected.json', '.agent_todos.json']);

  function showCleanupModal(data) {
    const overlay = document.getElementById('cleanup-overlay');
    const summaryEl = document.getElementById('cleanup-summary-text');
    const listEl = document.getElementById('cleanup-item-list');
    const execBtn = document.getElementById('cleanup-exec-btn');
    const confirmMsg = document.getElementById('cleanup-confirm-msg');

    cleanupConfirmStep = 0;
    execBtn.textContent = '削除実行 →';
    execBtn.style.background = '';
    confirmMsg.style.display = 'none';

    const toDelete = data.to_delete || [];
    const protectedItems = data.protected || [];
    let protectListModified = false;

    function updateSummary() {
      const delCount = [...listEl.querySelectorAll('.cleanup-delete-check:checked')].length;
      const protCount = [...listEl.querySelectorAll('.cleanup-protect-check:checked')].length;
      summaryEl.textContent = `削除: ${delCount}個 ／ 保護を継続: ${protCount}個`;
      if (delCount === 0 && protectListModified) {
        execBtn.disabled = false;
        execBtn.textContent = '保護リストを保存';
      } else {
        execBtn.disabled = delCount === 0;
        execBtn.textContent = '削除実行 →';
      }
    }

    function makeDeleteRow(item) {
      const row = document.createElement('div');
      row.className = 'cleanup-item';
      const icon = item.type === 'dir' ? '📁' : '📄';
      row.innerHTML =
        `<input type="checkbox" class="cleanup-delete-check" value="${item.name}" checked>`
        + `<span class="ci-icon">${icon}</span>`
        + `<span class="ci-name">${item.name}${item.type === 'dir' ? '/' : ''}</span>`
        + `<span class="ci-size">${item.size_str}</span>`
        + `<button class="ci-protect-btn" title="保護リストに追加">🔒</button>`;
      row.querySelector('input').addEventListener('change', updateSummary);
      row.querySelector('.ci-protect-btn').addEventListener('click', () => {
        row.remove();
        protectListModified = true;
        protLabel.textContent = `🔒 保護リスト — ${listEl.querySelectorAll('.cleanup-protect-check').length + 1}個（チェックを外すと次回から削除対象）`;
        listEl.insertBefore(makeProtectRow(item), null);
        updateSummary();
      });
      return row;
    }

    function makeProtectRow(item) {
      const row = document.createElement('div');
      const isAlways = ALWAYS_PROTECTED_NAMES.has(item.name) || ALWAYS_PROTECTED_NAMES.has(item.name + '/');
      row.className = 'cleanup-item' + (isAlways ? ' is-always-protected' : '');
      const icon = item.type === 'dir' ? '📁' : '📄';
      row.innerHTML =
        `<input type="checkbox" class="cleanup-protect-check" value="${item.name}" checked${isAlways ? ' disabled' : ''}>`
        + `<span class="ci-icon">${icon}</span>`
        + `<span class="ci-name">${item.name}${item.type === 'dir' ? '/' : ''}</span>`
        + `<span class="ci-size">${item.size_str}${isAlways ? ' <span style="color:#45475a;font-size:10px">常時保護</span>' : ''}</span>`;
      row.querySelector('input').addEventListener('change', () => {
        protectListModified = true;
        updateSummary();
      });
      return row;
    }

    listEl.innerHTML = '';

    // 削除対象セクション
    const delLabel = document.createElement('div');
    delLabel.className = 'cleanup-section-label';
    delLabel.textContent = `🗑️ 削除対象 — ${toDelete.length}個`;
    listEl.appendChild(delLabel);
    if (toDelete.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'cleanup-empty';
      empty.textContent = '削除対象はありません';
      listEl.appendChild(empty);
    } else {
      toDelete.forEach(item => listEl.appendChild(makeDeleteRow(item)));
    }

    // 保護リストセクション
    const protLabel = document.createElement('div');
    protLabel.className = 'cleanup-section-label';
    protLabel.textContent = `🔒 保護リスト — ${protectedItems.length}個（チェックを外すと次回から削除対象）`;
    listEl.appendChild(protLabel);
    if (protectedItems.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'cleanup-empty';
      empty.textContent = '保護リストは空です';
      listEl.appendChild(empty);
    } else {
      protectedItems.forEach(item => listEl.appendChild(makeProtectRow(item)));
    }

    updateSummary();
    overlay.classList.add('open');
  }

  function closeCleanupModal() {
    document.getElementById('cleanup-overlay').classList.remove('open');
    cleanupConfirmStep = 0;
  }

  async function handleCleanupExec() {
    const execBtn = document.getElementById('cleanup-exec-btn');
    const confirmMsg = document.getElementById('cleanup-confirm-msg');

    const toDelete = [...document.querySelectorAll('.cleanup-delete-check:checked')].map(el => el.value);
    const toProtect = [...document.querySelectorAll('.cleanup-protect-check:checked:not(:disabled)')].map(el => el.value);

    // 削除ゼロ・保護リスト変更のみの場合は確認なしで即保存
    if (toDelete.length === 0) {
      execBtn.disabled = true;
      execBtn.textContent = '保存中...';
      try {
        await fetch('/workspace/protected', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paths: toProtect }),
        });
        closeCleanupModal();
        const el = document.createElement('div');
        el.style.cssText = 'color:#a6e3a1;font-size:13px;padding:6px 12px;margin:4px 0;';
        el.textContent = '🔒 保護リストを更新しました';
        document.getElementById('chat').appendChild(el);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
      } catch(e) {
        execBtn.disabled = false;
        execBtn.textContent = '保護リストを保存';
        alert('エラー: ' + e.message);
      }
      return;
    }

    if (cleanupConfirmStep === 0) {
      cleanupConfirmStep = 1;
      execBtn.textContent = '本当に削除する';
      execBtn.style.background = '#d20f39';
      confirmMsg.style.display = 'inline';
      return;
    }

    execBtn.disabled = true;
    execBtn.textContent = '実行中...';
    try {
      // 1. 保護リストを更新
      await fetch('/workspace/protected', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paths: toProtect }),
      });
      // 2. 削除実行
      const res = await fetch('/workspace/cleanup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paths: toDelete }),
      });
      const result = await res.json();
      closeCleanupModal();
      const msg = `🧹 削除完了: ${result.deleted.length}個`
        + (result.errors.length > 0 ? ` (エラー: ${result.errors.length}個)` : '');
      const el = document.createElement('div');
      el.style.cssText = 'color:#a6e3a1;font-size:13px;padding:6px 12px;margin:4px 0;';
      el.textContent = msg;
      document.getElementById('chat').appendChild(el);
      document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    } catch(e) {
      execBtn.disabled = false;
      execBtn.textContent = '本当に削除する';
      alert('エラー: ' + e.message);
    }
  }

  // Esc キーでモーダルを閉じる
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCleanupModal();
  });

  // ---- GitLab パネル ----
  let glProjects = [];
  let glPanelOpen = false;

  async function toggleGitLabPanel() {
    const panel = document.getElementById('gitlab-panel');
    glPanelOpen = !glPanelOpen;
    panel.classList.toggle('open', glPanelOpen);
    if (glPanelOpen) {
      if (glProjects.length > 0) {
        renderProjects(glProjects);  // 先読み済みデータを即表示
      } else {
        await loadGitLabProjects();  // 未取得の場合のみfetch
      }
    }
  }

  async function loadGitLabProjects() {
    const listEl = document.getElementById('gitlab-list');
    listEl.innerHTML = '<div id="gitlab-status">読み込み中...</div>';
    try {
      const res = await fetch('/gitlab/projects');
      const data = await res.json();
      if (data.error) {
        listEl.innerHTML = `<div id="gitlab-status">⚠️ ${data.error}</div>`;
        return;
      }
      glProjects = data;
      renderProjects(glProjects);
    } catch(e) {
      listEl.innerHTML = `<div id="gitlab-status">⚠️ 取得失敗: ${e.message}</div>`;
    }
  }

  function renderProjects(projects) {
    const listEl = document.getElementById('gitlab-list');
    if (projects.length === 0) {
      listEl.innerHTML = '<div id="gitlab-status">プロジェクトが見つかりません</div>';
      return;
    }
    listEl.innerHTML = '';
    for (const p of projects) {
      const el = document.createElement('div');
      el.className = 'gl-project';
      const ago = p.last_activity_at ? timeAgo(p.last_activity_at) : '';
      el.innerHTML =
        `<div class="gl-project-name">${escHtml(p.name)}</div>`
        + `<div class="gl-project-ns">${escHtml(p.path_with_namespace)}</div>`
        + (p.description ? `<div class="gl-project-desc">${escHtml(p.description)}</div>` : '')
        + `<div class="gl-project-meta">`
        + `<span class="gl-badge">${escHtml(p.visibility)}</span>`
        + (ago ? `<span>${ago}</span>` : '')
        + `</div>`;
      el.onclick = () => selectProject(p);
      listEl.appendChild(el);
    }
  }

  function filterProjects(query) {
    const q = query.toLowerCase();
    const filtered = q
      ? glProjects.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.path_with_namespace.toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q))
      : glProjects;
    renderProjects(filtered);
  }

  function selectProject(p) {
    // クローンメッセージを入力欄にセットしてパネルを閉じる
    input.value = `${p.path_with_namespace} を workspace にクローンして: ${p.web_url}`;
    input.focus();
    toggleGitLabPanel();
  }

  function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return '今日';
    if (days === 1) return '昨日';
    if (days < 30)  return `${days}日前`;
    if (days < 365) return `${Math.floor(days / 30)}ヶ月前`;
    return `${Math.floor(days / 365)}年前`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // GitLab 設定チェック → ボタン表示 & データ先読み
  fetch('/gitlab/projects').then(r => r.json()).then(data => {
    if (!data.error && Array.isArray(data)) {
      document.getElementById('gitlab-btn').style.display = 'inline-block';
      glProjects = data;  // 先読みして保存（パネルを開いた時に即表示）
    }
  }).catch(() => {});

  // ---- プロバイダー設定パネル ----
  let pvPanelOpen = false;
  const PV_URL_HISTORY_KEY = 'pv_url_history';

  function pvUrlHistoryLoad() {
    try { return JSON.parse(localStorage.getItem(PV_URL_HISTORY_KEY) || '[]'); } catch { return []; }
  }

  function pvUrlHistorySave(url) {
    if (!url) return;
    const list = pvUrlHistoryLoad().filter(u => u !== url);
    list.unshift(url);
    localStorage.setItem(PV_URL_HISTORY_KEY, JSON.stringify(list.slice(0, 5)));
  }

  function pvUrlHistoryRender() {
    const dl = document.getElementById('pv-url-history');
    if (!dl) return;
    dl.innerHTML = pvUrlHistoryLoad().map(u => `<option value="${escHtml(u)}">`).join('');
  }

  // チェックボックス状態の永続化
  function pvCheckboxLoad() {
    const resetHistory = localStorage.getItem('pv_reset_history') === 'true';
    document.getElementById('pv-reset-history').checked = resetHistory;
  }
  function pvCheckboxSave() {
    localStorage.setItem('pv_reset_history', document.getElementById('pv-reset-history').checked);
  }
  document.getElementById('pv-reset-history').addEventListener('change', pvCheckboxSave);
  pvCheckboxLoad();

  async function toggleProviderPanel() {
    pvPanelOpen = !pvPanelOpen;
    document.getElementById('provider-panel').classList.toggle('open', pvPanelOpen);
    if (pvPanelOpen) { await loadFoundryInstances(); await loadCurrentProvider(); pvUrlHistoryRender(); }
  }

  async function loadFoundryInstances() {
    try {
      const presets = await fetch('/providers/presets').then(r => r.json());
      const sel = document.getElementById('pv-preset');
      const prev = sel.value;  // 現在の選択を保持
      // セレクト全体を再構築（Azure → Foundry複数 → Gemini → ローカル）
      const foundryOpts = (presets.foundry_instances || [])
        .map((inst, i) => `<option value="${inst.id}">${inst.name || `Azure AI Foundry ${i > 0 ? i+1 : ''}`}</option>`)
        .join('');
      const geminiOpt = presets.gemini ? `<option value="gemini">Google Gemini</option>` : '';
      sel.innerHTML =
        `<option value="azure">Azure OpenAI</option>` +
        foundryOpts +
        geminiOpt +
        `<option value="local">ローカルLLM（カスタム）</option>`;
      // 以前の選択を復元（存在する場合のみ）
      if (prev && sel.querySelector(`option[value="${CSS.escape(prev)}"]`)) sel.value = prev;
    } catch(e) { console.error('loadFoundryInstances:', e); }
  }

  async function loadCurrentProvider() {
    try {
      const res = await fetch('/providers/current');
      const data = await res.json();
      if (data.type === 'azure' || data.type === 'foundry' || data.type === 'gemini') {
        document.getElementById('pv-url').value = '';
        document.getElementById('pv-apikey').value = '';
        // preset_id を使う（foundry→foundry_1, gemini→gemini, azure→azure）
        syncPresetUI(data.type === 'foundry' ? (data.preset_id || 'foundry_1') : data.type);
      } else {
        // openai_compatible: URLは /v1 を除いて表示
        const base = (data.url || '').replace(/\/v1$/, '');
        document.getElementById('pv-url').value = base;
        document.getElementById('pv-apikey').value = '';
        if (base) { pvUrlHistorySave(base); pvUrlHistoryRender(); }
        syncPresetUI('local');
      }
      // ツールトグルを現在の設定に同期
      document.getElementById('pv-tools-enabled').checked = data.tools_enabled !== false;
      updatePvCurrent(data);
    } catch(e) {}
  }

  function presetToType(preset) {
    if (preset === 'azure') return 'azure';
    if (preset === 'gemini') return 'gemini';
    if (preset.startsWith('foundry')) return 'foundry';
    return 'openai_compatible';
  }

  function syncPresetUI(preset) {
    document.getElementById('pv-preset').value = preset;
    // アイコン更新
    const iconEl = document.getElementById('pv-preset-icon');
    if (iconEl) iconEl.innerHTML = PROVIDER_SVG[presetToType(preset)] || '';
    const urlGroup = document.getElementById('pv-url-group');
    const apikeyGroup = document.getElementById('pv-apikey-group');
    const fetchBtn = document.getElementById('pv-fetch-btn');
    const applyBtn = document.getElementById('pv-apply-btn');
    const azureBtn = document.getElementById('pv-azure-btn');
    const urlInput = document.getElementById('pv-url');
    const isFoundry = preset === 'foundry' || preset.startsWith('foundry_');
    const isPreset = preset === 'azure' || isFoundry || preset === 'gemini';
    if (isPreset) {
      // .env 設定を使うプリセット — URL/キー欄は不要
      urlGroup.style.display = 'none';
      apikeyGroup.style.display = 'none';
      fetchBtn.style.display = 'none';
      document.getElementById('pv-model-group').style.display = 'none';
      applyBtn.style.display = 'none';
      azureBtn.style.display = (preset === 'azure') ? 'none' : '';
    } else {
      urlGroup.style.display = '';
      apikeyGroup.style.display = '';
      fetchBtn.style.display = '';
      applyBtn.style.display = '';
      azureBtn.style.display = 'none';
      urlInput.placeholder = 'http://192.168.x.x:1234';
    }
  }

  async function onPresetChange() {
    const preset = document.getElementById('pv-preset').value;
    localStorage.setItem('pv_preset', preset);
    if (preset === 'azure') {
      await resetToAzure();
    } else if (preset === 'foundry' || preset.startsWith('foundry_')) {
      await switchToFoundryPreset(preset);
    } else if (preset === 'gemini') {
      await switchToGeminiPreset();
    } else {
      syncPresetUI(preset);
      document.getElementById('pv-url').value = '';
      document.getElementById('pv-model-group').style.display = 'none';
      setPvStatus('', null);
    }
  }

  async function switchToFoundryPreset(presetId = 'foundry_1') {
    syncPresetUI(presetId);
    setPvStatus('切り替え中...', null);
    try {
      const presets = await fetch('/providers/presets').then(r => r.json());
      if (!presets.foundry_instances || presets.foundry_instances.length === 0) {
        setPvStatus('⚠️ .env に FOUNDRY_ENDPOINT / FOUNDRY_MODEL が未設定です', false);
        return;
      }
      const res = await fetch('/providers/preset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preset: presetId }),
      });
      const data = await res.json();
      if (data.error) { setPvStatus('⚠️ ' + data.error, false); return; }
      updatePvCurrent(data.provider);
      await loadDeployments();
      const instName = data.provider.name || 'Azure AI Foundry';
      setPvStatus(`✓ ${instName} に切り替えました (${data.provider.model})`, true);
      if (document.getElementById('pv-reset-history').checked) {
        history = []; turns = []; localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(SESSION_ID_KEY);
        chat.innerHTML = ''; updateTurnCount();
      }
      setTimeout(() => toggleProviderPanel(), 800);
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  async function switchToGeminiPreset() {
    syncPresetUI('gemini');
    setPvStatus('切り替え中...', null);
    try {
      const presets = await fetch('/providers/presets').then(r => r.json());
      if (!presets.gemini) {
        setPvStatus('⚠️ .env に GEMINI_API_KEY が未設定です（/setup で設定）', false);
        return;
      }
      const res = await fetch('/providers/preset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preset: 'gemini' }),
      });
      const data = await res.json();
      if (data.error) { setPvStatus('⚠️ ' + data.error, false); return; }
      updatePvCurrent(data.provider);
      await loadDeployments();
      setPvStatus(`✓ Google Gemini に切り替えました (${data.provider.model})`, true);
      if (document.getElementById('pv-reset-history').checked) {
        history = []; turns = []; localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(SESSION_ID_KEY);
        chat.innerHTML = ''; updateTurnCount();
      }
      setTimeout(() => toggleProviderPanel(), 800);
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  let _currentProviderType = 'azure';

  function updatePvCurrent(data) {
    _currentProviderType = data.type;
    const label = data.type === 'foundry' ? (data.name || 'Azure AI Foundry')
                : data.type === 'azure'   ? 'Azure OpenAI'
                : data.type === 'gemini'  ? 'Google Gemini'
                : 'OpenAI互換';
    document.getElementById('pv-current').textContent = `現在: ${label} / ${data.model || '(未設定)'}`;
    const labelEl = document.getElementById('provider-label');
    labelEl.innerHTML = (PROVIDER_SVG[data.type] || PROVIDER_SVG.openai_compatible) + `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${shortModel(data.model)}</span>`;
    // Azure / Foundry / Gemini はデプロイ選択ドロップダウンを表示
    const sel = document.getElementById('model-select');
    if (data.type === 'azure' || data.type === 'foundry' || data.type === 'gemini') {
      if (sel.options.length > 1) sel.value = data.model;
    } else {
      sel.style.display = 'none';
    }
  }

  async function loadDeployments() {
    try {
      const pv = await fetch('/providers/current').then(r => r.json());
      if (pv.type !== 'azure' && pv.type !== 'foundry' && pv.type !== 'gemini') return; // ローカルはデプロイ選択不要
      const res = await fetch('/providers/deployments');
      const data = await res.json();
      const sel = document.getElementById('model-select');
      sel.innerHTML = '';
      data.deployments.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (d === data.current) opt.selected = true;
        sel.appendChild(opt);
      });
      // 複数デプロイがある場合のみ表示
      sel.style.display = data.deployments.length > 1 ? '' : 'none';
    } catch(e) { /* 無視 */ }
  }

  async function switchDeployment(model) {
    try {
      const res = await fetch('/providers/deployment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model }),
      });
      const data = await res.json();
      if (data.status === 'ok') {
        const labelEl = document.getElementById('provider-label');
        labelEl.innerHTML = (PROVIDER_SVG[_currentProviderType] || PROVIDER_SVG.openai_compatible) + `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${shortModel(model)}</span>`;
      }
    } catch(e) { /* 無視 */ }
  }

  function shortModel(name) {
    if (!name) return '';
    return name.length > 20 ? name.slice(0, 20) + '…' : name;
  }

  async function fetchProviderModels() {
    const url = document.getElementById('pv-url').value.trim();
    const apikey = document.getElementById('pv-apikey').value.trim();
    if (!url) { setPvStatus('URLを入力してください', false); return; }
    setPvStatus('取得中...', null);
    try {
      const params = new URLSearchParams({ url });
      if (apikey) params.set('api_key', apikey);
      const res = await fetch('/providers/models?' + params);
      const data = await res.json();
      if (data.error) { setPvStatus('⚠️ ' + data.error, false); return; }
      const sel = document.getElementById('pv-model');
      sel.innerHTML = data.models.map(m => `<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
      document.getElementById('pv-model-group').style.display = 'flex';
      setPvStatus(`✓ ${data.models.length} モデルを取得`, true);
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  async function applyProviderConfig() {
    const url = document.getElementById('pv-url').value.trim();
    const apikey = document.getElementById('pv-apikey').value.trim();
    const modelSel = document.getElementById('pv-model');
    const model = modelSel.value || modelSel.options[0]?.value || '';
    const tools_enabled = document.getElementById('pv-tools-enabled').checked;
    if (!url) { setPvStatus('URLを入力してください', false); return; }
    if (!model) { setPvStatus('モデルを選択してください', false); return; }
    try {
      const res = await fetch('/providers/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, api_key: apikey, model, tools_enabled }),
      });
      const data = await res.json();
      if (data.status !== 'ok') { setPvStatus('⚠️ 設定失敗', false); return; }
      pvUrlHistorySave(url);
      pvUrlHistoryRender();
      localStorage.setItem('pv_preset', document.getElementById('pv-preset').value);
      updatePvCurrent(data.provider);
      setPvStatus('✓ 適用しました', true);
      if (document.getElementById('pv-reset-history').checked) {
        history = []; turns = []; localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(SESSION_ID_KEY);
        chat.innerHTML = ''; updateTurnCount();
      }
      setTimeout(() => toggleProviderPanel(), 800);
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  async function resetToAzure() {
    try {
      const res = await fetch('/providers/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: '', api_key: '', model: '' }),
      });
      const data = await res.json();
      localStorage.setItem('pv_preset', 'azure');
      updatePvCurrent(data.provider);
      document.getElementById('pv-model-group').style.display = 'none';
      syncPresetUI('azure');
      await loadCurrentProvider();
      await loadDeployments();
      setPvStatus('✓ Azureに戻しました', true);
      if (document.getElementById('pv-reset-history').checked) {
        history = []; turns = []; localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(SESSION_ID_KEY);
        chat.innerHTML = ''; updateTurnCount();
      }
    } catch(e) {
      setPvStatus('⚠️ ' + e.message, false);
    }
  }

  function setPvStatus(msg, ok) {
    const el = document.getElementById('pv-status');
    el.textContent = msg;
    el.className = 'pv-status ' + (ok === true ? 'pv-ok' : ok === false ? 'pv-err' : '');
  }

  // 起動時にプロバイダーラベルを更新
  fetch('/providers/current').then(r => r.json()).then(data => {
    // プリセット選択を復元してからラベル更新
    const savedPreset = localStorage.getItem('pv_preset');
    if (savedPreset) syncPresetUI(savedPreset);
    updatePvCurrent(data);
  }).catch(() => {});
  loadDeployments();

  // ---- 送信 ----
  async function sendMessage() {
    const text = input.value.trim();
    if (!text && pendingImages.length === 0) return;
    input.value = '';
    input.style.height = 'auto';
    abortController = new AbortController();
    setGenerating(true);

    // 送信する画像を確定してプレビューエリアをクリア
    const imagesToSend = [...pendingImages];
    pendingImages = [];
    document.getElementById('image-preview-area').innerHTML = '';

    // 新しいターンを開始
    const turnEl = createTurnEl();
    const userMsgEl = appendMsg(turnEl, 'user', text || '(画像)');
    // 添付画像をユーザーメッセージ内に表示
    imagesToSend.forEach(img => {
      const imgEl = document.createElement('img');
      imgEl.src = img.url;
      imgEl.className = 'msg-img';
      userMsgEl.appendChild(imgEl);
    });
    // スピナー＋状態表示（Claude Code スタイル）
    const statusEl = createStatusLine(turnEl);
    let aiMsg = null;
    function getOrCreateAiMsg() {
      if (!aiMsg) {
        aiMsg = appendMsg(turnEl, 'ai', '');
      }
      return aiMsg;
    }
    let currentResultEl = null;
    let currentToolName = null;
    let currentToolGroupEl = null;      // ターン内のツールをまとめる <details>
    let currentToolGroupInnerEl = null; // ツールブロックを入れる内側 div
    let currentToolGroupNames = [];     // グループ内のツール名リスト
    let finalAnswer = '';
    let turnMessages = [];  // tool含む完全なメッセージリスト
    let currentModelName = null;

    // API履歴は最新 MAX_API_MESSAGES 件のみ送信
    const trimmedHistory = history.slice(-MAX_API_MESSAGES);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify({
          message: text || '(添付画像について教えてください)',
          history: trimmedHistory,
          images: imagesToSend.map(i => ({ data: i.data, mime: i.mime })),
          bypass_approval: isBypassActive(),
          no_think: isNoThinkActive(),
        }),
      });

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        buf += decoder.decode(value ?? new Uint8Array(), { stream: !done });
        if (done) {
          // done時もbufに残ったデータを処理する（最終チャンク取りこぼし防止）
          if (buf.trim()) {
            for (const line of buf.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              try {
                const data = JSON.parse(line.slice(6));
                if (data.type === 'answer_chunk') {
                  genPhase = 'responding'; genTokenChars += data.content.length; updateGenStatus();
                  updateStatusLine(statusEl, 'Responding...');
                  finalAnswer += data.content;
                  setAiContent(getOrCreateAiMsg(), stripThink(finalAnswer));
                } else if (data.type === 'token_usage') {
                  tokenSession.prompt     += data.prompt;
                  tokenSession.completion += data.completion;
                  tokenSession.total      += data.total;
                  updateTokenInfo(data.prompt, data.completion);
                  genHasActualUsage = true;
                  const gsEl = document.getElementById('gen-status');
                  if (gsEl) {
                    const secs = Math.floor((Date.now() - genStartTime) / 1000);
                    gsEl.textContent = `${secs}s · ↑ ${data.prompt} ↓ ${data.completion} tokens`;
                  }
                } else if (data.type === 'history_messages') {
                  turnMessages = data.messages;
                }
              } catch { /* ignore */ }
            }
          }
          break;
        }
        // 完結した行のみ処理（末尾の不完全な行はバッファに残す）
        const parts = buf.split('\n');
        buf = parts.pop(); // 最後の（未完の可能性がある）行を残す
        const lines = parts;
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }
          if (data.type === 'tool_start') {
            genPhase = data.name; updateGenStatus();
            updateStatusLine(statusEl, getToolStatusText(data.name, data.args));
            finalAnswer = '';
            currentToolName = data.name;
            // ツールグループを作成（ターン内の初回のみ）
            if (!currentToolGroupEl) {
              currentToolGroupEl = document.createElement('details');
              currentToolGroupEl.className = 'tool-group';
              currentToolGroupEl.open = false;
              const s = document.createElement('summary');
              currentToolGroupEl.appendChild(s);
              const inner = document.createElement('div');
              inner.className = 'tool-group-inner';
              currentToolGroupEl.appendChild(inner);
              currentToolGroupInnerEl = inner;
              currentToolGroupNames = [];
              turnEl.appendChild(currentToolGroupEl);
            }
            currentToolGroupNames.push(data.name);
            // 同名ツールを集計して "run_command ×8" 形式で表示
            { const c = {}; for (const n of currentToolGroupNames) c[n] = (c[n]||0)+1;
              const parts = Object.entries(c).map(([n,v]) => v>1?`${n} ×${v}`:n).join(', ');
              currentToolGroupEl.querySelector('summary').textContent =
                `⚙️ ${currentToolGroupNames.length}個のツールを実行中… · ${parts}`; }
            currentResultEl = addToolBlock(currentToolGroupInnerEl, data.name, data.args);
          } else if (data.type === 'tool_result') {
            if (currentResultEl) setResult(currentResultEl, currentToolName, data.result);
          } else if (data.type === 'answer_chunk') {
            genPhase = 'responding'; genTokenChars += data.content.length; updateGenStatus();
            updateStatusLine(statusEl, 'Responding...');
            finalAnswer += data.content;
            // <think>...</think> を非表示（Qwen CoT）
            setAiContent(getOrCreateAiMsg(), stripThink(finalAnswer));
          } else if (data.type === 'history_messages') {
            turnMessages = data.messages;
          } else if (data.type === 'history_compressed') {
            // ローリングサマリー: 古い履歴をサマリーで置換してlocalStorageを更新
            history = data.messages;
            saveHistory();
          } else if (data.type === 'todo_update') {
            renderTodos(data.todos);
          } else if (data.type === 'cleanup_preview') {
            showCleanupModal(data.data);
          } else if (data.type === 'manim_render') {
            // Manimレンダリング結果をツールグループ内にインライン表示
            const imgWrap = document.createElement('div');
            imgWrap.style.cssText = 'margin: 8px 0 4px 0;';
            const label = document.createElement('div');
            label.style.cssText = 'font-size: 11px; color: var(--subtext0); margin-bottom: 4px;';
            label.textContent = `🎬 ${data.scene || 'Manim'} レンダリング結果`;
            const img = document.createElement('img');
            img.src = `data:${data.mime};base64,${data.image}`;
            img.alt = data.scene || 'Manim render';
            img.style.cssText = 'max-width: 100%; max-height: 480px; border-radius: 8px; border: 1px solid var(--surface1); display: block;';
            imgWrap.appendChild(label);
            imgWrap.appendChild(img);
            if (currentToolGroupInnerEl) {
              currentToolGroupInnerEl.appendChild(imgWrap);
            } else {
              turnEl.appendChild(imgWrap);
            }
          } else if (data.type === 'token_usage') {
            tokenSession.prompt     += data.prompt;
            tokenSession.completion += data.completion;
            tokenSession.total      += data.total;
            updateTokenInfo(data.prompt, data.completion);
            // gen-status を実際のトークン数で更新
            genHasActualUsage = true;
            const gsEl = document.getElementById('gen-status');
            if (gsEl) {
              const secs = Math.floor((Date.now() - genStartTime) / 1000);
              gsEl.textContent = `${secs}s · ↑ ${data.prompt} ↓ ${data.completion} tokens`;
            }
          } else if (data.type === 'answer_done') {
            // モデル名をラベルに表示
            if (data.model) {
              currentModelName = data.model;
              if (aiMsg?._labelEl) aiMsg._labelEl.textContent = `Assistant (${data.model})`;
            }
            // ツールグループを折りたたみ、サマリーを完了表示に更新
            if (currentToolGroupEl) {
              const c = {}; for (const n of currentToolGroupNames) c[n] = (c[n]||0)+1;
              const parts = Object.entries(c).map(([n,v]) => v>1?`${n} ×${v}`:n).join(', ');
              currentToolGroupEl.querySelector('summary').textContent =
                `🔧 ${currentToolGroupNames.length}個のツールを実行 · ${parts}`;
              currentToolGroupEl.open = false;
              currentToolGroupEl = null;
              currentToolGroupInnerEl = null;
              currentToolGroupNames = [];
            }
          } else if (data.type === 'answer') {
            // フォールバック (後方互換)
            finalAnswer = data.content;
            setAiContent(getOrCreateAiMsg(), data.content);
          }
        }
      }
    } catch(e) {
      if (e.name === 'AbortError') {
        setAiContent(getOrCreateAiMsg(), (finalAnswer ? stripThink(finalAnswer) : '') + ' [停止]');
      } else {
        getOrCreateAiMsg().textContent = `エラー: ${e.message}`;
      }
    } finally {
      statusEl.remove();
      abortController = null;
      setGenerating(false);
      input.focus();
    }

    // 履歴・ターン更新 (tool メッセージを含む完全な履歴を保持)
    history.push({ role: 'user', content: text });
    if (turnMessages.length > 0) {
      turnMessages.forEach(m => history.push(m));
    } else {
      history.push({ role: 'assistant', content: finalAnswer });
    }
    turns.push({ el: turnEl, userText: text, aiText: finalAnswer, modelName: currentModelName });

    foldOldTurns();
    updateTurnCount();
    saveHistory();
  }

  // ---- 起動時復元 ----
  loadHistory();

  // ---- 音声入力 (Web Speech API) ----
  (function() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById('mic-btn');
    let recognition = null;
    let isRecording = false;
    let baseText = '';      // 確定済みテキスト
    let interimText = '';   // 認識途中のテキスト

    if (!SpeechRecognition) {
      micBtn.classList.add('unsupported');
      micBtn.title = '音声入力はこのブラウザでは未対応です（Chrome/Edgeをお使いください）';
      micBtn.onclick = () => alert('音声入力は Chrome または Edge でのみ利用できます。');
      return;
    }

    function buildRecognition() {
      const r = new SpeechRecognition();
      r.lang = 'ja-JP';
      r.interimResults = true;   // 認識途中も表示
      r.continuous = true;       // 手動停止まで継続認識

      r.onstart = () => {
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.title = 'クリックで停止';
        const inp = document.getElementById('input');
        baseText = inp.value;    // 既存テキストを保持
      };

      r.onresult = (e) => {
        let interim = '';
        let finalPart = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalPart += t;
          else interim += t;
        }
        if (finalPart) {
          baseText = (baseText ? baseText + (baseText.endsWith('\n') ? '' : '') : '') + finalPart;
          interimText = '';
        } else {
          interimText = interim;
        }
        const inp = document.getElementById('input');
        inp.value = baseText + interimText;
        // textarea 高さを自動リサイズ
        inp.style.height = 'auto';
        inp.style.height = Math.min(inp.scrollHeight, 200) + 'px';
      };

      r.onerror = (e) => {
        const msg = { 'not-allowed': 'マイクへのアクセスが拒否されました。ブラウザの設定を確認してください。',
                      'no-speech': '音声が検出されませんでした。', 'network': 'ネットワークエラーが発生しました。' };
        if (e.error !== 'aborted') alert(msg[e.error] || `音声認識エラー: ${e.error}`);
        stopMic();
      };

      r.onend = () => {
        // continuous=trueでも接続切れで終わる場合があるので、録音中なら再起動
        if (isRecording) {
          try { recognition.start(); } catch(_) { stopMic(); }
        }
      };
      return r;
    }

    function stopMic() {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.title = '音声入力（日本語）';
      interimText = '';
      if (recognition) { try { recognition.stop(); } catch(_) {} }
      // 入力欄の末尾にフォーカス
      const inp = document.getElementById('input');
      inp.focus();
      inp.setSelectionRange(inp.value.length, inp.value.length);
    }

    window.toggleMic = function() {
      if (isRecording) {
        stopMic();
      } else {
        recognition = buildRecognition();
        try { recognition.start(); }
        catch(e) { alert('マイクを起動できませんでした: ' + e.message); }
      }
    };
  })();
</script>
