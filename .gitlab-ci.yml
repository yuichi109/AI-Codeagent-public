stages:
  - sync

# main に push されたら for_windows へ自動マージ
sync-to-windows:
  stage: sync
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
  image: alpine/git
  script:
    - git config --global user.email "ci@ai-codeagent"
    - git config --global user.name "CI Auto-sync"
    - git remote set-url origin "https://oauth2:${GITLAB_PAT}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git fetch origin
    - git checkout -b for_windows origin/for_windows
    - |
      if git merge origin/main --no-edit -m "ci: sync main → for_windows [skip ci]"; then
        git push origin for_windows
        echo "✅ for_windows を main に同期しました"
      else
        git merge --abort
        echo "⚠️ コンフリクトがあります。手動マージが必要です"
        exit 0
      fi
