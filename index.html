<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Azure Code Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 20px; background: #181825; border-bottom: 1px solid #313244; font-weight: bold; font-size: 16px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; }
  .ai { align-self: flex-start; background: #313244; }
  .tool-block { align-self: flex-start; background: #1e1e2e; border: 1px solid #45475a; border-radius: 8px; padding: 8px 12px; font-family: monospace; font-size: 13px; max-width: 80%; }
  .tool-block .label { color: #a6e3a1; font-size: 11px; margin-bottom: 4px; }
  .tool-block .args { color: #fab387; }
  .tool-block .result { color: #cdd6f4; margin-top: 4px; max-height: 120px; overflow-y: auto; }
  #input-area { display: flex; gap: 8px; padding: 12px 20px; background: #181825; border-top: 1px solid #313244; }
  #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; font-size: 14px; outline: none; }
  #input:focus { border-color: #89b4fa; }
  #send { padding: 10px 20px; background: #89b4fa; color: #1e1e2e; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div id="header">🤖 Azure Code Agent</div>
<div id="chat"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="指示を入力してください..." />
  <button id="send" onclick="sendMessage()">送信</button>
</div>

<script>
  let history = [];
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const send = document.getElementById('send');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function addMsg(cls, text) {
    const d = document.createElement('div');
    d.className = `msg ${cls}`;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  const TOOL_ICONS = {
    read_file: '📄', write_file: '✏️', list_files: '📁',
    run_command: '⚡', web_search: '🔍', web_fetch: '🌐', code_lint: '🔬',
  };

  function addToolBlock(name, args) {
    const icon = TOOL_ICONS[name] || '🔧';
    const d = document.createElement('div');
    d.className = 'tool-block';
    const resultId = `r-${name}-${Date.now()}`;
    const isLong = ['web_fetch', 'read_file'].includes(name);
    d.innerHTML = `<div class="label">${icon} ${name}</div><div class="args">${JSON.stringify(args)}</div>`
      + (isLong
        ? `<details><summary style="color:#a6e3a1;cursor:pointer;font-size:12px">結果を展開</summary><div class="result" id="${resultId}"></div></details>`
        : `<div class="result" id="${resultId}"></div>`);
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d.querySelector('.result');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    send.disabled = true;

    addMsg('user', text);
    const aiMsg = addMsg('ai', '考え中...');
    let currentResultEl = null;
    let finalAnswer = '';

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'tool_start') {
          aiMsg.textContent = '';
          currentResultEl = addToolBlock(data.name, data.args);
        } else if (data.type === 'tool_result') {
          if (currentResultEl) currentResultEl.textContent = data.result;
        } else if (data.type === 'answer') {
          finalAnswer = data.content;
          aiMsg.textContent = data.content;
        }
      }
    }

    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: finalAnswer });
    send.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
